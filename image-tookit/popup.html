<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Toolkit</title>
    <link rel="stylesheet" href="cropper.min.css">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">

        <!-- HEADER -->
        <header>
            <div class="header-top">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </div>
                <div class="header-text">
                    <h1>Image Toolkit</h1>
                    <p>Premium Image Utilities</p>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="cropper">
                    ✂️ Crop Image
                </button>
                <button class="tab-btn" data-tab="pdf">
                    📄 Image to PDF
                </button>
            </div>
        </header>

        <main>

            <!-- ===================== CROPPER TAB ===================== -->
            <section id="cropper-section" class="tab-content active">

                <!-- Upload -->
                <div class="upload-area" id="cropUploadArea">
                    <label for="upload" class="upload-label">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                        </div>
                        <span class="upload-text-main">Upload Image to Crop</span>
                        <span class="upload-text-sub">Supports JPG, PNG, WebP</span>
                        <input type="file" id="upload" accept="image/*">
                    </label>
                </div>

                <!-- Controls -->
                <div class="cropper-controls">
                    <!-- Aspect Ratio chips -->
                    <div class="control-group">
                        <label>Aspect Ratio</label>
                        <div class="chip-group" id="ratio-chips">
                            <button class="chip active" data-ratio="free">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="5 9 2 12 5 15" />
                                    <polyline points="9 5 12 2 15 5" />
                                    <polyline points="15 19 12 22 9 19" />
                                    <polyline points="19 9 22 12 19 15" />
                                    <line x1="2" y1="12" x2="22" y2="12" />
                                    <line x1="12" y1="2" x2="12" y2="22" />
                                </svg>
                                Free
                            </button>
                            <button class="chip" data-ratio="1">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                </svg>
                                1:1
                            </button>
                            <button class="chip" data-ratio="16/9">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="5" width="20" height="14" rx="2" />
                                </svg>
                                16:9
                            </button>
                            <button class="chip" data-ratio="4/3">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="4" width="20" height="16" rx="2" />
                                </svg>
                                4:3
                            </button>
                        </div>
                    </div>

                    <div class="control-divider"></div>

                    <!-- Export Format chips -->
                    <div class="control-group">
                        <label>Export Format</label>
                        <div class="chip-group" id="format-chips">
                            <button class="chip active" data-format="png">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                PNG
                            </button>
                            <button class="chip" data-format="jpg">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                JPG
                            </button>
                            <button class="chip" data-format="jpeg">
                                <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                JPEG
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Preview -->
                <div class="preview-container">
                    <div class="preview-box">
                        <div class="preview-placeholder" id="cropPlaceholder">
                            <svg viewBox="0 0 24 24">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                            <span>Upload an image to start</span>
                        </div>
                        <img id="image" alt="Preview" style="display:none;">
                    </div>
                </div>

                <!-- Action -->
                <div class="actions">
                    <button id="download-crop" class="primary-btn">
                        <svg class="btn-icon" viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Download Cropped Image
                    </button>
                </div>

            </section>

            <!-- ===================== PDF TAB ===================== -->
            <section id="pdf-section" class="tab-content">

                <!-- Upload -->
                <div class="upload-area">
                    <label for="imageInput" class="upload-label">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                <polyline points="14 2 14 8 20 8" />
                                <line x1="16" y1="13" x2="8" y2="13" />
                                <line x1="16" y1="17" x2="8" y2="17" />
                                <polyline points="10 9 9 9 8 9" />
                            </svg>
                        </div>
                        <span class="upload-text-main">Select Images for PDF</span>
                        <span class="upload-text-sub">Multiple images supported · JPG, PNG, WebP</span>
                        <input type="file" id="imageInput" multiple accept="image/*">
                    </label>
                </div>

                <!-- File count -->
                <div id="fileCount" class="file-status">No files selected</div>

                <!-- Thumbnail grid -->
                <div id="pdf-preview-grid" class="preview-grid"></div>

                <!-- Action -->
                <div class="actions">
                    <button id="convertBtn" class="primary-btn">
                        <svg class="btn-icon" viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg>
                        Convert to PDF
                    </button>
                </div>

                <div id="statusMsg" class="status-msg"></div>

            </section>
        </main>

        <!-- FOOTER -->
        <footer>
            <div class="footer-dot"></div>
            <p>Premium Image Utilities</p>
            <div class="footer-dot"></div>
        </footer>

    </div>

    <script src="cropper.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
