<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Planner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="title-wrap">
        <div class="hero-illustration" aria-hidden="true"></div>
        <h1 class="title">Budget Planner</h1>
        <p class="subtitle">Track income, expenses, and monthly limit</p>
      </header>

      <section class="balance-card">
        <span class="balance-label">Current Balance</span>
        <div class="balance-amount" id="balance">₹0.00</div>
        <div class="stats-grid">
          <div class="stat income">
            <span class="stat-label">Income</span>
            <span id="totalIncome" class="stat-value">₹0.00</span>
          </div>
          <div class="stat expense">
            <span class="stat-label">Expense</span>
            <span id="totalExpense" class="stat-value">₹0.00</span>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Add Entry</h2>

        <label for="title">Title</label>
        <input id="title" placeholder="e.g. Salary, Grocery" maxlength="50" />

        <label for="amount">Amount</label>
        <input id="amount" type="number" min="0.01" step="0.01" placeholder="Enter amount" />

        <label for="entryDate">Date</label>
        <input id="entryDate" type="date" />

        <div class="row">
          <div class="col">
            <label for="type">Type</label>
            <select id="type">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
          <div class="col">
            <label for="category">Category</label>
            <select id="category">
              <option>Food</option>
              <option>Rent</option>
              <option>Travel</option>
              <option>Shopping</option>
              <option>Bills</option>
              <option>Salary</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <button id="add" class="primary">Add Entry</button>
      </section>

      <section class="section">
        <h2>Monthly Budget Limit</h2>
        <label for="limit">Set Limit</label>
        <input id="limit" type="number" min="0" step="0.01" placeholder="e.g. 20000" />
        <button id="saveLimit">Save Limit</button>
        <div class="limit-progress">
          <div id="limitBar" class="limit-progress-bar"></div>
        </div>
        <p id="limitInfo" class="hint">No monthly limit set.</p>
      </section>

      <section class="section">
        <h2>Reports</h2>
        <label for="monthFilter">Select Month</label>
        <input type="month" id="monthFilter" />
        <div class="button-row">
          <button id="viewReport">View Monthly Report</button>
          <button id="resetReport" class="muted">Show All</button>
        </div>
        <button id="export" class="muted">Export CSV</button>
      </section>

      <section class="section">
        <h2>Spending Overview</h2>
        <canvas id="chart" width="320" height="210"></canvas>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>Transaction History</h2>
          <button id="clearHistory" class="danger">Clear All</button>
        </div>
        <ul id="history"></ul>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="chart.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
