<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>SnapCam Pro — Screen Recorder</title>
  <link rel="stylesheet" href="recorder.css">
</head>
<body>

  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 8h3l1.5-2h7L17 8h3a2 2 0 0 1 2 2v7a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3v-7a2 2 0 0 1 2-2Z"></path>
        <circle cx="12" cy="13" r="3.5"></circle>
      </svg>
    </div>
    <div class="logo-text">Snap<span>Cam</span> Pro — Screen Recorder</div>
    <div class="header-right">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <rect x="1" y="2" width="14" height="9" rx="1.5"></rect>
        <path d="M5 14h6"></path>
        <path d="M8 11v3"></path>
      </svg>
      Tab Capture
    </div>
  </div>

  <div class="main">
    <div class="left">
      <div class="preview-wrap" id="previewWrap">
        <video id="liveVideo" autoplay muted playsinline></video>
        <div class="placeholder" id="placeholder">
          <div class="big-icon">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="42" height="28" rx="4"></rect>
              <path d="M16 42h16"></path>
              <path d="M24 34v8"></path>
              <path d="M18 20l4 4 8-8"></path>
            </svg>
          </div>
          <p id="placeholderText">Click "Start Recording" below to capture your screen or a tab.</p>
        </div>
        <div class="rec-badge" id="recBadge">
          <span class="rec-dot"></span> REC
        </div>
        <div class="rec-timer" id="recTimer">00:00</div>
      </div>

      <div class="status-bar" id="statusBar"></div>
      <div class="controls" id="controls"></div>

      <div class="settings">
        <div class="settings-row">
          <span class="settings-label">Audio</span>
          <select id="screenAudio">
            <option value="system">System audio</option>
            <option value="mic">Microphone</option>
            <option value="none" selected>No audio</option>
          </select>
        </div>
        <div class="settings-row">
          <span class="settings-label">Note</span>
          <span class="settings-note">Chrome will ask what to share</span>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="gallery-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="13" height="13" style="display:inline-block;vertical-align:middle;margin-right:4px">
          <path d="M13 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"></path>
          <path d="M5 8h6"></path><path d="M5 5h6"></path><path d="M5 11h4"></path>
        </svg>
        Recordings (<span id="fileCount">0</span>)
      </div>
      <div class="gallery" id="gallery">
        <div class="gallery-empty">
          <div class="e-icon">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="26" height="26" rx="4"></rect>
              <path d="M9 9h6v6H9z"></path><path d="M17 9h6v6h-6z"></path>
              <path d="M9 17h6v6H9z"></path><path d="M17 17h6v6h-6z"></path>
            </svg>
          </div>
          No recordings yet
        </div>
      </div>
    </div>
  </div>

  <canvas id="captureCanvas"></canvas>
  <script src="recorder.js"></script>
</body>
</html>
