<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Screen Recorder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <main class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">Screen Recorder</h1>
      <p class="subtitle">Fast • Private • Offline</p>
    </header>

    <!-- Main Card -->
    <section class="card">

      <!-- Recording Status -->
      <div class="status">
        <span class="record-indicator" id="recordDot"></span>
        <span id="status" class="status-text">Ready to record</span>
      </div>

      <!-- Big Timer -->
      <div id="timer" class="timer">00:00</div>

      <!-- Controls -->
      <div class="controls">
        <button id="startBtn" class="primary">Start Recording</button>
        <button id="stopBtn" class="danger" disabled>Stop</button>
      </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
      <small>Your recording never leaves your computer</small>
    </footer>

    <script src="popup.js"></script>

  </main>
</body>
</html>
