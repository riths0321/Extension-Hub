<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Test</title>
    <style>
        body {
            background: #333;
            min-height: 100vh;
        }

        /* CSS from style.css */
        #analog-watch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #111 0%, #000 70%);
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 999999;
            cursor: move;
            overflow: hidden;
            /* This prevents numbers from going outside */
        }

        .hand {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: bottom center;
            background: white;
            border-radius: 4px;
            z-index: 10;
            /* Make sure hands are above marks */
        }

        .hour {
            width: 6px;
            height: 30px;
            margin-left: -3px;
            margin-top: -30px;
            background: #ccc;
        }

        .minute {
            width: 4px;
            height: 40px;
            margin-left: -2px;
            margin-top: -40px;
            background: #eee;
        }

        .second {
            width: 2px;
            height: 45px;
            margin-left: -1px;
            margin-top: -45px;
            background: red;
            z-index: 11;
            /* Second hand above everything */
        }

        .center-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 12;
            /* Above everything */
        }

        /* Roman numeral marks */
        .mark {
            position: absolute;
            color: white;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            text-align: center;
            line-height: 1;
            pointer-events: none;
            /* Don't interfere with dragging */
        }

        .mark-hour {
            color: #fff;
            font-size: 12px;
            font-weight: normal;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.8);
        }

        /* Remove the dot style and create proper minute marks */
        .mark-minute {
            width: 2px;
            height: 4px;
            background: #666;
            border-radius: 1px;
            color: transparent !important;
            /* Hide the dot character */
        }
    </style>
</head>

<body>
    <script>
        // JS from content.js
        if (!document.getElementById("analog-watch")) {
            const watch = document.createElement("div");
            watch.id = "analog-watch";

            // Create clock face with Roman numerals
            const romanNumerals = ["XII", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI"];

            // Add hour marks (Roman numerals) - positioned properly inside
            for (let i = 0; i < 12; i++) {
                const mark = document.createElement("div");
                mark.className = "mark mark-hour";

                // Calculate position - properly centered inside
                const angle = (i * 30) * Math.PI / 180;
                const radius = 35; // Even closer to center
                const x = 50 + Math.sin(angle) * radius;
                const y = 50 - Math.cos(angle) * radius;

                mark.textContent = romanNumerals[i];
                mark.style.left = `${x}%`;
                mark.style.top = `${y}%`;
                mark.style.transform = `translate(-50%, -50%)`;
                watch.appendChild(mark);
            }

            // Add minute marks (small lines instead of dots)
            for (let i = 0; i < 60; i++) {
                if (i % 5 !== 0) { // Skip where hour marks are
                    const mark = document.createElement("div");
                    mark.className = "mark mark-minute";

                    const angle = (i * 6) * Math.PI / 180;
                    const radius = 42; // Position for minute marks
                    const x = 50 + Math.sin(angle) * radius;
                    const y = 50 - Math.cos(angle) * radius;

                    // Position and rotate the minute mark
                    mark.style.left = `${x}%`;
                    mark.style.top = `${y}%`;
                    mark.style.transform = `translate(-50%, -50%) rotate(${i * 6}deg)`;
                    mark.style.transformOrigin = 'center';
                    watch.appendChild(mark);
                }
            }

            const hour = document.createElement("div");
            hour.className = "hand hour";

            const minute = document.createElement("div");
            minute.className = "hand minute";

            const second = document.createElement("div");
            second.className = "hand second";

            const center = document.createElement("div");
            center.className = "center-dot";

            watch.appendChild(hour);
            watch.appendChild(minute);
            watch.appendChild(second);
            watch.appendChild(center);
            document.body.appendChild(watch);

            function updateClock() {
                const now = new Date();
                const sec = now.getSeconds();
                const min = now.getMinutes();
                const hr = now.getHours();

                const secDeg = sec * 6;
                const minDeg = min * 6 + sec * 0.1;
                const hrDeg = hr * 30 + min * 0.5;

                second.style.transform = `rotate(${secDeg}deg) translateY(-50%)`;
                minute.style.transform = `rotate(${minDeg}deg) translateY(-50%)`;
                hour.style.transform = `rotate(${hrDeg}deg) translateY(-50%)`;

                console.log(`Updated clock: ${hr}:${min}:${sec}`);
            }

            setInterval(updateClock, 1000);
            updateClock();
        }
    </script>
</body>

</html>
