<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgreeSafe Privacy Protector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="header-card">
      <div class="brand">
        <img src="icons/icon48.png" alt="AgreeSafe logo" class="logo">
        <div>
          <h1>AgreeSafe</h1>
          <p class="subtitle">Privacy protection for every tab</p>
        </div>
      </div>
      <label class="toggle-switch" aria-label="Toggle protection">
        <input type="checkbox" id="toggleProtection" checked>
        <span class="slider"></span>
      </label>
    </header>

    <section class="status-card" aria-live="polite">
      <div>
        <p class="label">Protection</p>
        <p id="statusText" class="status active">Active</p>
      </div>
      <div class="pulses" id="statusPulse" aria-hidden="true"></div>
    </section>

    <section class="stats-grid">
      <article class="stat-card">
        <p class="stat-label">Trackers Blocked</p>
        <p class="stat-value" id="totalBlocked">0</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Blocked Domains</p>
        <p class="stat-value" id="sitesProtected">0</p>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Current Site</h2>
      </div>
      <p class="current-site" id="currentSite">Loading...</p>
      <button class="btn btn-primary" id="whitelistBtn" type="button">
        <span id="whitelistText">Add to Whitelist</span>
      </button>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Blocked on This Site</h2>
        <button class="btn-link" id="clearStats" type="button">Clear</button>
      </div>
      <div class="list" id="trackerList">
        <p class="empty-state">No trackers blocked yet</p>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Whitelisted Sites</h2>
      </div>
      <div class="list" id="whitelistList">
        <p class="empty-state">No whitelisted sites</p>
      </div>
    </section>
  </main>

  <div id="notificationContainer" class="notification-container" aria-live="polite"></div>
  <script src="popup.js"></script>
</body>
</html>
