<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticky Notes</title>
<link rel="stylesheet" href="popup.css">
</head>

<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1 class="logo">
            <span class="icon">🗒️</span>
            Sticky Notes
        </h1>
        <p class="subtitle">Add notes directly on webpages</p>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button id="newNoteBtn" class="btn-primary">
            ➕ New Note
        </button>

        <button id="showAllBtn" class="btn-secondary">
            👁 Show All
        </button>

        <button id="hideAllBtn" class="btn-secondary">
            🙈 Hide All
        </button>
    </div>

    <!-- Quick Tips -->
    <div class="quick-tips">
        <h3>💡 How to Use</h3>
        <ul>
            <li><b>Drag</b> the header to move notes</li>
            <li><b>Drag</b> bottom-right corner to resize</li>
            <li><b>Double-click</b> header to minimize</li>
            <li>👁 Toggle visibility</li>
            <li>🔒 Lock editing</li>
            <li>🎨 Change color</li>
        </ul>
    </div>

    <!-- Settings -->
    <div class="settings">
        <h3>⚙ Settings</h3>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="autoSave" checked>
                Auto-save notes
            </label>
        </div>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="startOnBoot">
                Reopen notes on browser start
            </label>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Notes are stored locally in your browser
    </div>


    </div>

    <script src="popup.js"></script>

</body>
</html>
