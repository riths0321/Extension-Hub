<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Form Filler</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Smart Productivity</p>
        <h1>Auto Form Filler</h1>
        <p class="subtitle">Save profiles and fill forms instantly on active tab.</p>
      </header>

      <section class="panel">
        <label for="profile">Profile</label>
        <select id="profile">
          <option value="work">Work</option>
          <option value="personal">Personal</option>
        </select>

        <div class="field-grid">
          <label>Name <input id="name" placeholder="Jane Doe" /></label>
          <label>Email <input id="email" type="email" placeholder="jane@example.com" /></label>
          <label>Phone <input id="phone" placeholder="+1 555 123 4567" /></label>
          <label>Address <input id="address" placeholder="123 Main Street" /></label>
          <label>Company <input id="company" placeholder="Acme Inc." /></label>
          <label>Website <input id="website" placeholder="https://example.com" /></label>
        </div>

        <label for="note">Note</label>
        <textarea id="note" placeholder="Extra note / remarks"></textarea>
      </section>

      <section class="actions">
        <button id="save" class="btn-secondary" type="button">Save Profile</button>
        <button id="fill" class="btn-primary" type="button">Analyze & Fill</button>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
