<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app" id="app" data-mode="work">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">FOCUS</span>
    </div>
    <div class="session-badge" id="sessionBadge">
      <span class="tomato-icon">🍅</span>
      <span id="sessionCount">0</span>
    </div>
  </header>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="tab active" data-mode="work">Focus</button>
    <button class="tab" data-mode="shortBreak">Short Break</button>
    <button class="tab" data-mode="longBreak">Long Break</button>
  </div>

  <!-- Timer Ring -->
  <div class="timer-wrap">
    <svg class="ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Track circle -->
      <circle class="ring-track" cx="100" cy="100" r="88" />
      <!-- Progress circle — stroke color driven by CSS var via class -->
      <circle
        class="ring-progress"
        id="ringProgress"
        cx="100" cy="100" r="88"
        stroke-dasharray="553"
        stroke-dashoffset="0"
      />
    </svg>

    <div class="timer-content">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="mode-label" id="modeLabel">Focus Time</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Reset -->
    <button class="btn-icon" id="resetBtn" aria-label="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           xmlns="http://www.w3.org/2000/svg">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-4.55"></path>
      </svg>
    </button>

    <!-- Start / Pause — icon injected by JS via createElementNS -->
    <button class="btn-primary" id="mainBtn">
      <span class="btn-icon-play" id="mainBtnIcon"></span>
      <span id="mainBtnLabel">Start</span>
    </button>

    <!-- Skip -->
    <button class="btn-icon" id="skipBtn" aria-label="Skip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           xmlns="http://www.w3.org/2000/svg">
        <polygon points="5 4 15 12 5 20 5 4"></polygon>
        <line x1="19" y1="5" x2="19" y2="19"></line>
      </svg>
    </button>

  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="todayCount">0</span>
      <span class="stat-label">Today</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-val" id="totalMins">0m</span>
      <span class="stat-label">Focused</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-val" id="streakVal">0</span>
      <span class="stat-label">Streak</span>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
