<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mandala Artist</title>
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <p class="eyebrow">Sacred Geometry Studio</p>
      <h1>Mandala Artist</h1>
      <p class="subtitle">Build mirrored patterns on any page or open a full artboard.</p>
    </header>

    <section class="hero-card">
      <div class="hero-ring" aria-hidden="true"></div>
      <div class="hero-copy">
        <span class="hero-label">Ready to draw</span>
        <p>Use quick overlay for fast sketches or launch the full canvas for detailed work.</p>
      </div>
    </section>

    <div class="quick-actions">
      <button id="startDrawing" class="btn-primary action-btn" type="button">
        <span class="action-title">Overlay Draw</span>
        <span class="action-text">Sketch directly on the current page</span>
      </button>

      <button id="openCanvas" class="btn-secondary action-btn" type="button">
        <span class="action-title">Full Canvas</span>
        <span class="action-text">Open the dedicated mandala studio</span>
      </button>
    </div>

    <section class="settings-section">
      <div class="section-head">
        <h2>Brush Setup</h2>
        <span class="section-chip">Live</span>
      </div>

      <div class="form-group">
        <label for="symmetry">Symmetry</label>
        <select id="symmetry">
          <option value="4">4-fold</option>
          <option value="6" selected>6-fold</option>
          <option value="8">8-fold</option>
          <option value="12">12-fold</option>
          <option value="16">16-fold</option>
        </select>
      </div>

      <div class="form-group">
        <div class="field-header">
          <label for="brushSize">Brush Size</label>
          <span id="brushSizeValue" class="value-pill">10 px</span>
        </div>
        <input type="range" id="brushSize" min="1" max="50" value="10">
      </div>

      <div class="form-group">
        <label for="brushColor">Brush Color</label>
        <input type="color" id="brushColor" value="#ff6b6b">
      </div>
    </section>

    <section class="patterns-section">
      <div class="section-head">
        <h2>Quick Patterns</h2>
        <span class="section-chip alt">Preset</span>
      </div>
      <div class="patterns-grid">
        <button class="pattern-item" data-pattern="radial" type="button">Radial</button>
        <button class="pattern-item" data-pattern="circular" type="button">Circular</button>
        <button class="pattern-item" data-pattern="flower" type="button">Flower</button>
        <button class="pattern-item" data-pattern="geometric" type="button">Geometric</button>
      </div>
    </section>

    <footer class="footer">
      <button id="openOptions" class="btn-link" type="button">Studio Settings</button>
      <button id="clearCanvas" class="btn-danger" type="button">Clear Saved Export</button>
    </footer>
  </div>
</body>
</html>
