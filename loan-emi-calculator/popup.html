<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loan EMI Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Loan EMI Calculator
      </h1>
      <p>Estimate monthly EMI, total repayment, and interest burden.</p>
    </header>

    <section class="card form-card">
      <label class="field">
        <span>Loan Amount</span>
        <div class="input-wrap">
          <span class="prefix">₹</span>
          <input type="number" id="amount" placeholder="500000" min="1" step="1" />
        </div>
      </label>

      <div class="grid-2">
        <label class="field">
          <span>Interest Rate (p.a.)</span>
          <div class="input-wrap">
            <input type="number" id="rate" placeholder="8.5" min="0" step="0.01" />
            <span class="suffix">%</span>
          </div>
        </label>

        <label class="field">
          <span>Tenure (months)</span>
          <input type="number" id="months" placeholder="60" min="1" step="1" />
        </label>
      </div>

      <div class="quick-row">
        <button class="quick" data-months="12" type="button">1Y</button>
        <button class="quick" data-months="36" type="button">3Y</button>
        <button class="quick" data-months="60" type="button">5Y</button>
        <button class="quick" data-months="120" type="button">10Y</button>
      </div>

      <div class="actions">
        <button id="calculate" class="btn primary" type="button">Calculate EMI</button>
        <button id="reset" class="btn ghost" type="button">Reset</button>
      </div>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card result-card">
      <div class="result-row">
        <span>Monthly EMI</span>
        <strong id="emi">-</strong>
      </div>
      <div class="result-row">
        <span>Total Interest</span>
        <strong id="interest">-</strong>
      </div>
      <div class="result-row">
        <span>Total Payment</span>
        <strong id="total">-</strong>
      </div>
      <div class="result-row muted">
        <span>Principal Share</span>
        <strong id="principalShare">-</strong>
      </div>
      <div class="result-row muted">
        <span>Interest Share</span>
        <strong id="interestShare">-</strong>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
