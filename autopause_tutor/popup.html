<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPause Tutor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <header class="hero">
      <p class="kicker">Study Assistant</p>
      <h1>AutoPause Tutor</h1>
      <p>Focus-safe video control for productive sessions</p>
    </header>

    <section class="status-card">
      <div class="status-row">
        <span class="label">Status</span>
        <strong id="statusText" class="status-chip">ACTIVE</strong>
      </div>
      <p id="watchTimeDisplay" class="watch-time">Today's Watch Time: 0h 0m 0s</p>
      <div class="focus-strip" aria-hidden="true"></div>
    </section>

    <section class="controls-card">
      <label class="switch-row" for="toggleBtn">
        <span>Enable AutoPause</span>
        <span class="switch">
          <input type="checkbox" id="toggleBtn" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="select-row" for="inactivitySelect">
        <span>Pause after inactivity</span>
        <select id="inactivitySelect">
          <option value="60">1 minute</option>
          <option value="180">3 minutes</option>
          <option value="300" selected>5 minutes</option>
          <option value="600">10 minutes</option>
        </select>
      </label>

      <button id="resetWatchTimeBtn" class="reset-btn" type="button">Reset today's watch time</button>
    </section>

    <p class="hint">Videos pause when tab becomes inactive or idle. Resume when you return.</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
