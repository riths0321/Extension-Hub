<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Design Token Generator</title>
  <link rel="stylesheet" href="styles/popup.css" />
</head>
<body>
  <main class="shell" aria-live="polite">
    <header class="hero">
      <h1>Design Token Generator</h1>
      <p>Extract clean tokens from the active page and export instantly.</p>
    </header>

    <section class="panel">
      <h2>Token Scope</h2>
      <div class="checks">
        <label><input type="checkbox" id="colors" checked />Colors</label>
        <label><input type="checkbox" id="typography" checked />Typography</label>
        <label><input type="checkbox" id="spacing" checked />Spacing</label>
        <label><input type="checkbox" id="shadows" checked />Shadows</label>
        <label><input type="checkbox" id="borderRadius" checked />Border Radius</label>
        <label><input type="checkbox" id="breakpoints" checked />Breakpoints</label>
      </div>
    </section>

    <section class="panel compact">
      <label class="field-label" for="format">Export Format</label>
      <select id="format">
        <option value="css">CSS Variables</option>
        <option value="tailwind">Tailwind Config</option>
        <option value="json">Design System JSON</option>
        <option value="scss">SCSS Variables</option>
        <option value="figma">Figma Tokens</option>
      </select>
    </section>

    <button id="scanBtn" class="scan-btn" type="button">Scan Active Tab</button>

    <p id="loading" class="loading hidden">Scanning page styles...</p>

    <section id="results" class="results hidden">
      <textarea id="output" readonly placeholder="Generated tokens will appear here."></textarea>
      <div class="actions">
        <button id="copyBtn" class="action-btn" type="button">Copy</button>
        <button id="downloadBtn" class="action-btn" type="button">Download</button>
        <button id="clearBtn" class="action-btn danger" type="button">Clear</button>
      </div>
      <p class="stats" id="stats">No scan yet.</p>
    </section>
  </main>

  <script src="templates/template-generator.js"></script>
  <script src="popup.js"></script>
</body>
</html>
