<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-label="Abstract night gradient background">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1334"/>
      <stop offset="45%" stop-color="#132954"/>
      <stop offset="100%" stop-color="#071022"/>
    </linearGradient>
    <radialGradient id="orbA" cx="25%" cy="12%" r="52%">
      <stop offset="0%" stop-color="#3dd5f3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3dd5f3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="82%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#6df2a8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6df2a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="800" height="1200" fill="url(#base)"/>
  <rect width="800" height="1200" fill="url(#orbA)"/>
  <rect width="800" height="1200" fill="url(#orbB)"/>

  <g opacity="0.35" filter="url(#soft)">
    <circle cx="120" cy="180" r="90" fill="#9ce7ff"/>
    <circle cx="700" cy="300" r="120" fill="#79ffe4"/>
    <circle cx="420" cy="960" r="150" fill="#8efbb8"/>
  </g>

  <g opacity="0.18" stroke="#d7e7ff" stroke-width="1">
    <path d="M-80 540 C 170 390, 350 710, 640 560 S 920 420, 960 520" fill="none"/>
    <path d="M-100 860 C 140 710, 370 1040, 620 890 S 900 760, 980 860" fill="none"/>
  </g>

  <g opacity="0.24" fill="#f3f8ff">
    <circle cx="95" cy="110" r="1.2"/>
    <circle cx="170" cy="80" r="1.1"/>
    <circle cx="245" cy="118" r="1.3"/>
    <circle cx="680" cy="130" r="1.4"/>
    <circle cx="740" cy="170" r="1.2"/>
    <circle cx="120" cy="1020" r="1.2"/>
    <circle cx="220" cy="960" r="1.1"/>
    <circle cx="640" cy="1040" r="1.3"/>
    <circle cx="710" cy="980" r="1.4"/>
  </g>
</svg>
