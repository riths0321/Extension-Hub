<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Snippet Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="notification" id="notification" role="status" aria-live="polite"></div>

        <header class="header">
            <div>
                <p class="eyebrow">Developer Toolkit</p>
                <h1>Code Snippet Manager</h1>
            </div>
            <div class="header-actions">
                <button id="newSnippet" class="btn-primary" type="button">New</button>
                <button id="exportSnippets" class="btn-secondary" type="button">Export</button>
                <button id="importSnippets" class="btn-secondary" type="button">Import</button>
                <input id="importFile" type="file" accept="application/json" class="hidden" />
            </div>
        </header>

        <section class="search-box">
            <input type="text" id="search" placeholder="Search title or code..." />
            <select id="filterLanguage">
                <option value="">All Languages</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
                <option value="php">PHP</option>
                <option value="sql">SQL</option>
                <option value="plaintext">Plain Text</option>
            </select>
        </section>

        <section id="editorView" class="hidden">
            <div class="editor-header">
                <input type="text" id="snippetTitle" placeholder="Snippet title" maxlength="100" />
                <select id="snippetLanguage">
                    <option value="plaintext">Plain Text</option>
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="php">PHP</option>
                    <option value="sql">SQL</option>
                </select>
            </div>
            <textarea id="snippetCode" placeholder="Paste your code here..."></textarea>
            <div class="editor-actions">
                <button id="saveSnippet" class="btn-primary" type="button">Save</button>
                <button id="cancelEdit" class="btn-secondary" type="button">Cancel</button>
                <button id="insertToPage" class="btn-success" type="button">Insert to Page</button>
            </div>
        </section>

        <main id="snippetsList"></main>

        <section id="noSnippets" class="hidden">
            <div class="empty-illustration">&lt;/&gt;</div>
            <p>No snippets saved yet.</p>
            <button id="createFirstSnippet" class="btn-primary" type="button">Create First Snippet</button>
        </section>
    </div>

    <script src="storage-manager.js"></script>
    <script src="popup.js"></script>
</body>
</html>
