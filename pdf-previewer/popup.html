<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Previewer Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="light">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1 class="app-title">PDF Previewer</h1>
        <p class="app-sub">Premium PDF Utilities</p>
      </div>
    </div>
    <button id="themeToggle" class="icon-btn" title="Toggle Theme">
      <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display:none">
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/>
        <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <!-- ===== TAB NAVIGATION ===== -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="upload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Upload
    </button>
    <button class="tab-btn" data-tab="url">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      URL
    </button>
    <button class="tab-btn" data-tab="recent">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Recent
    </button>
  </nav>

  <!-- ===== UPLOAD TAB ===== -->
  <div class="tab-panel active" id="tab-upload">
    <input type="file" id="fileInput" accept="application/pdf" hidden />

    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="18" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <polyline points="9 15 12 12 15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="drop-title">Drop your PDF here</p>
      <p class="drop-sub">or click to browse</p>
      <button id="selectFileBtn" class="primary-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Choose PDF File
      </button>
    </div>
  </div>

  <!-- ===== URL TAB ===== -->
  <div class="tab-panel" id="tab-url">
    <div class="url-panel">
      <label class="input-label">PDF URL</label>
      <div class="url-input-row">
        <input type="url" id="urlInput" class="url-input" placeholder="https://example.com/file.pdf" />
        <button id="loadUrlBtn" class="load-btn">Load</button>
      </div>
      <p class="url-note">Loads PDF directly from any public URL</p>
      <div id="urlStatus" class="url-status hidden"></div>
    </div>
  </div>

  <!-- ===== RECENT TAB ===== -->
  <div class="tab-panel" id="tab-recent">
    <div class="recent-header">
      <span class="recent-label">Recent Files</span>
      <button id="clearRecentBtn" class="ghost-btn">Clear All</button>
    </div>
    <div id="recentList" class="recent-list">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" opacity="0.3"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p>No recent files yet</p>
      </div>
    </div>
  </div>

  <!-- ===== FILE INFO BAR (shown when PDF loaded) ===== -->
  <div id="fileInfoBar" class="file-info-bar hidden">
    <div class="file-info-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2"/></svg>
    </div>
    <div class="file-info-text">
      <span id="fileNameDisplay" class="file-name">document.pdf</span>
      <span id="fileSizeDisplay" class="file-size">0 KB</span>
    </div>
    <button id="clearPdfBtn" class="icon-btn small" title="Clear PDF">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ===== VIEWER TOOLBAR ===== -->
  <div id="viewerToolbar" class="viewer-toolbar hidden">
    <div class="toolbar-left">
      <!-- Zoom Controls -->
      <button id="zoomOutBtn" class="tool-btn" title="Zoom Out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span id="zoomLevel" class="zoom-display">100%</span>
      <button id="zoomInBtn" class="tool-btn" title="Zoom In">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="11" y1="8" x2="11" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button id="zoomResetBtn" class="tool-btn ghost" title="Reset Zoom">Reset</button>
    </div>
    <div class="toolbar-right">
      <button id="openFullBtn" class="tool-btn accent" title="Open Fullscreen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Fullscreen
      </button>
    </div>
  </div>

  <!-- ===== PDF VIEWER ===== -->
  <div id="viewerContainer" class="viewer-container hidden">
    <div class="viewer-placeholder" id="viewerPlaceholder">
      <div class="spinner" id="loadingSpinner" style="display:none">
        <div class="spin-ring"></div>
      </div>
    </div>
    <iframe id="pdfViewer" title="PDF preview" style="display:none;"></iframe>
  </div>

  <script src="popup.js"></script>
</body>
</html>
