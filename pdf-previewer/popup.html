<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PDF Previewer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h3>PDF Previewer</h3>

  <!-- Hidden File Input -->
  <input type="file" id="fileInput" accept="application/pdf" hidden />

  <!-- Action Buttons -->
  <div class="button-group">
    <button id="selectFileBtn">Select PDF File</button>
    <button id="openFullBtn" class="secondary-btn" disabled>
      Open Full Screen
    </button>
  </div>

  <!-- Small Preview Area -->
  <div id="viewerContainer">
    <embed id="pdfViewer" type="application/pdf" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
