<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PDF Full Screen Viewer</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    embed {
      width: 95%;
      height: 95%;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <embed id="fullPdfViewer" type="application/pdf" />

  <script src="viewer.js"></script>
</body>
</html>
