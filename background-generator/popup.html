<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Generator Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER (unchanged) -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="rgba(255,255,255,0.25)"/>
            <path d="M12 5 Q19 12 12 19 Q5 12 12 5Z" fill="rgba(255,255,255,0.6)"/>
            <circle cx="12" cy="12" r="3.5" fill="white"/>
          </svg>
        </div>
        <div>
          <h1>BG Generator <span class="pro-badge">PRO</span></h1>
          <p>Backgrounds for developers</p>
        </div>
      </div>
      <button id="btn-apply-page" title="Apply background to current webpage">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Apply to Page
      </button>
    </div>
  </header>

  <!-- PREVIEW BOX — always visible -->
  <div class="preview-wrap">
    <div id="preview-box"></div>
  </div>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="gradient">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="9"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
      Gradient
    </button>
    <button class="tab-btn" data-tab="solid">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="3" y="3" width="18" height="18" rx="4"/>
      </svg>
      Solid
    </button>
    <button class="tab-btn" data-tab="pattern">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="5" cy="5" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
        <circle cx="19" cy="5" r="1.5" fill="currentColor"/>
        <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="5" cy="19" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
        <circle cx="19" cy="19" r="1.5" fill="currentColor"/>
      </svg>
      Pattern
    </button>
    <button class="tab-btn" data-tab="saved">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      Saved
    </button>
    <button class="tab-btn" data-tab="recent">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Recent
    </button>
  </nav>

  <!-- ===================== GRADIENT TAB ===================== -->
  <div id="tab-gradient" class="tab-content active">

    <!-- Controls card -->
    <div class="section-card">

      <!-- Type -->
      <div class="field-row">
        <label class="field-label">Type</label>
        <div class="seg-control" id="gradient-type-seg">
          <button class="seg-btn active" data-value="linear">Linear</button>
          <button class="seg-btn" data-value="radial">Radial</button>
          <button class="seg-btn" data-value="conic">Conic</button>
        </div>
      </div>

      <!-- Angle -->
      <div class="field-row" id="angle-control">
        <label class="field-label">Angle</label>
        <div class="angle-wrap">
          <input type="range" id="angle-slider" min="0" max="360" value="135" class="range-input angle-slider">
          <div class="angle-display">
            <input type="number" id="angle-number" min="0" max="360" value="135">
            <span>°</span>
          </div>
        </div>
      </div>

      <!-- Colors -->
      <div class="colors-header">
        <label class="field-label">Colors</label>
        <div class="color-count-btns">
          <button id="remove-color" class="count-btn">−</button>
          <span id="color-count">3</span>
          <button id="add-color" class="count-btn">+</button>
        </div>
      </div>
      <div id="color-stops-row" class="color-stops-row"></div>

      <!-- Randomize -->
      <button id="btn-randomize" class="btn-primary full-width">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        Randomize Gradient
      </button>
    </div>

    <!-- Output -->
    <div class="output-section">
      <div class="output-header">
        <span class="field-label">Output</span>
        <div class="output-header-actions">
          <div class="fmt-toggle" id="output-format-toggle">
            <button class="fmt-btn active" data-fmt="css">CSS</button>
            <button class="fmt-btn" data-fmt="tailwind">Tailwind</button>
          </div>
          <button id="btn-save-gradient" class="icon-save-btn" title="Save background">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="output-box">
        <code id="output-code">background: linear-gradient(...);</code>
        <button id="btn-copy-output" class="icon-copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Presets -->
    <div class="section-card">
      <label class="field-label section-label-preset">Quick Presets</label>
      <div class="presets-grid" id="gradient-presets"></div>
    </div>

  </div>

  <!-- ===================== SOLID TAB ===================== -->
  <div id="tab-solid" class="tab-content">

    <!-- Picker + info -->
    <div class="section-card">
      <div class="solid-picker-wrap">
        <input type="color" id="solid-color-input" value="#2563EB" class="big-color-input">
        <div class="solid-color-info">
          <div class="solid-color-preview" id="solid-preview-swatch"></div>
          <div>
            <div class="solid-color-name" id="solid-color-name">Royal Blue</div>
            <div class="solid-color-value" id="solid-color-value">#2563EB</div>
          </div>
        </div>
      </div>

      <!-- Format toggle -->
      <div class="format-toggle-row">
        <label class="field-label">Format</label>
        <div class="fmt-toggle" id="color-format-toggle">
          <button class="fmt-btn active" data-fmt="hex">HEX</button>
          <button class="fmt-btn" data-fmt="rgb">RGB</button>
          <button class="fmt-btn" data-fmt="hsl">HSL</button>
        </div>
      </div>

      <!-- Shades -->
      <label class="field-label shades-label">Shades</label>
      <div class="shades-row" id="shades-row"></div>
    </div>

    <!-- Output -->
    <div class="output-section">
      <div class="output-header">
        <span class="field-label">Output</span>
        <div class="output-header-actions">
          <div class="fmt-toggle" id="output-format-toggle-solid">
            <button class="fmt-btn active" data-fmt="css">CSS</button>
            <button class="fmt-btn" data-fmt="tailwind">Tailwind</button>
          </div>
          <button id="btn-save-solid" class="icon-save-btn" title="Save background">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="output-box">
        <code id="output-code-solid">background-color: #2563EB;</code>
        <button id="btn-copy-output-solid" class="icon-copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Color Harmony -->
    <div class="section-card">
      <label class="field-label harmony-label">Color Harmony</label>
      <div class="harmony-row">
        <span class="harmony-label">Complementary</span>
        <div class="harmony-swatches" id="harmony-comp"></div>
      </div>
      <div class="harmony-row">
        <span class="harmony-label">Analogous</span>
        <div class="harmony-swatches" id="harmony-anal"></div>
      </div>
      <div class="harmony-row harmony-row-last">
        <span class="harmony-label">Triadic</span>
        <div class="harmony-swatches" id="harmony-tri"></div>
      </div>
    </div>

  </div>

  <!-- ===================== PATTERN TAB ===================== -->
  <div id="tab-pattern" class="tab-content">

    <!-- Pattern Type grid -->
    <div class="section-card">
      <label class="field-label pattern-type-label">Pattern Type</label>
      <div class="pattern-types-grid" id="pattern-types">
        <button class="pattern-type-btn active" data-pattern="dots">
          <div class="pattern-thumb" data-preview="dots"></div>
          <span>Dots</span>
        </button>
        <button class="pattern-type-btn" data-pattern="grid">
          <div class="pattern-thumb" data-preview="grid"></div>
          <span>Grid</span>
        </button>
        <button class="pattern-type-btn" data-pattern="lines">
          <div class="pattern-thumb" data-preview="lines"></div>
          <span>Lines</span>
        </button>
        <button class="pattern-type-btn" data-pattern="diagonal">
          <div class="pattern-thumb" data-preview="diagonal"></div>
          <span>Diagonal</span>
        </button>
        <button class="pattern-type-btn" data-pattern="checker">
          <div class="pattern-thumb" data-preview="checker"></div>
          <span>Checker</span>
        </button>
        <button class="pattern-type-btn" data-pattern="zigzag">
          <div class="pattern-thumb" data-preview="zigzag"></div>
          <span>Zigzag</span>
        </button>
      </div>
    </div>

    <!-- Pattern color + size controls -->
    <div class="section-card">
      <div class="field-row">
        <label class="field-label">Foreground</label>
        <div class="color-pick-row">
          <input type="color" id="pattern-fg" value="#2563EB" class="inline-color-input">
          <span class="inline-color-val" id="pattern-fg-val">#2563EB</span>
        </div>
      </div>
      <div class="field-row">
        <label class="field-label">Background</label>
        <div class="color-pick-row">
          <input type="color" id="pattern-bg" value="#FFFFFF" class="inline-color-input">
          <span class="inline-color-val" id="pattern-bg-val">#FFFFFF</span>
        </div>
      </div>
      <div class="field-row pattern-size-row">
        <label class="field-label">Size <span id="pattern-size-val" class="size-badge">20px</span></label>
        <input type="range" id="pattern-size" min="8" max="60" value="20" class="range-input pattern-size-slider">
      </div>
    </div>

    <!-- Output -->
    <div class="output-section">
      <div class="output-header">
        <span class="field-label">Output</span>
        <div class="output-header-actions">
          <div class="fmt-toggle" id="output-format-toggle-pattern">
            <button class="fmt-btn active" data-fmt="css">CSS</button>
            <button class="fmt-btn" data-fmt="tailwind">Tailwind</button>
          </div>
          <button id="btn-save-pattern" class="icon-save-btn" title="Save background">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="output-box">
        <code id="output-code-pattern">background: radial-gradient(...);</code>
        <button id="btn-copy-output-pattern" class="icon-copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- ===================== SAVED TAB ===================== -->
  <div id="tab-saved" class="tab-content">
    <div class="saved-container" id="saved-container"></div>

    <!-- Output -->
    <div class="output-section">
      <div class="output-header">
        <span class="field-label">Output</span>
        <div class="output-header-actions">
          <div class="fmt-toggle" id="output-format-toggle-saved">
            <button class="fmt-btn active" data-fmt="css">CSS</button>
            <button class="fmt-btn" data-fmt="tailwind">Tailwind</button>
          </div>
          <button id="btn-save-saved" class="icon-save-btn btn-save-hidden" title="Save background">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="output-box">
        <code id="output-code-saved">— select a saved item —</code>
        <button id="btn-copy-output-saved" class="icon-copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== RECENT TAB ===================== -->
  <div id="tab-recent" class="tab-content">
    <div id="recent-history-row" class="recent-history-row"></div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
