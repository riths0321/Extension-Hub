<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broken Link Finder Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app" class="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <svg class="brand-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5z" fill="currentColor"/>
        <path d="M7.414 15.414a2 2 0 01-2.828-2.828l3-3a2 2 0 012.828 0 1 1 0 001.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 005.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5z" fill="currentColor"/>
      </svg>
      <span class="brand-name">Broken Link Finder</span>
      <span class="brand-badge">Pro</span>
    </div>
    <div class="header-actions">
      <button id="themeToggle" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="themeIconDark" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
        <svg id="themeIconLight" class="hidden" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
      </button>
      <button id="settingsToggle" class="icon-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Settings panel ──────────────────────────────────────── -->
  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-grid">
      <label class="toggle-row">
        <span>Check external links</span>
        <input type="checkbox" id="settingExternal" role="switch">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <label class="toggle-row">
        <span>Auto-highlight on scan</span>
        <input type="checkbox" id="settingAutoHighlight" role="switch">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <label class="toggle-row">
        <span>Show notifications</span>
        <input type="checkbox" id="settingNotifications" role="switch">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <div class="settings-row-select">
        <span class="settings-select-label">Timeout</span>
        <select id="settingTimeout">
          <option value="5000">5 seconds</option>
          <option value="10000" selected>10 seconds</option>
          <option value="15000">15 seconds</option>
          <option value="30000">30 seconds</option>
        </select>
      </div>
      <div class="settings-row-select">
        <span class="settings-select-label">Concurrency</span>
        <select id="settingConcurrency">
          <option value="4">4 parallel</option>
          <option value="8" selected>8 parallel</option>
          <option value="12">12 parallel</option>
          <option value="16">16 parallel</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── Tabs (page / bulk / history) ──────────────────────────── -->
  <nav class="view-tabs">
    <button class="view-tab active" data-view="page">Page Scan</button>
    <button class="view-tab" data-view="bulk">Bulk Scan</button>
    <button class="view-tab" data-view="history">History</button>
  </nav>

  <!-- ══ VIEW: PAGE SCAN ══════════════════════════════════════════ -->
  <div id="view-page" class="view active">

    <!-- URL bar -->
    <div class="url-bar">
      <svg class="url-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 1c-1.657 2-2.5 4-2.5 7s.843 5 2.5 7M8 1c1.657 2 2.5 4 2.5 7s-.843 5-2.5 7M1 8h14" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      <span id="currentUrl" class="url-text">—</span>
    </div>

    <!-- Scan controls -->
    <div class="controls-row">
      <button id="scanBtn" class="btn btn-primary">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 9a2 2 0 114 0 2 2 0 01-4 0z"/><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a4 4 0 00-3.446 6.032l-2.261 2.26a1 1 0 101.414 1.415l2.261-2.261A4 4 0 1011 5z" clip-rule="evenodd"/></svg>
        Scan Page
      </button>
      <button id="highlightBtn" class="btn btn-outline" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a2 2 0 00-2 2v11a3 3 0 106 0V4a2 2 0 00-2-2H4zm1 14a1 1 0 100-2 1 1 0 000 2zm5-1.757l4.9-4.9a2 2 0 000-2.828L13.485 5.1a2 2 0 00-2.828 0L10 5.757v8.486z" clip-rule="evenodd"/></svg>
        Highlight
      </button>
      <button id="clearBtn" class="btn btn-ghost" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Clear
      </button>
    </div>

    <!-- Progress bar -->
    <div id="progressWrap" class="progress-wrap hidden">
      <progress id="progressFill" class="progress-bar" value="0" max="100"></progress>
      <span id="progressLabel" class="progress-label">0 / 0</span>
    </div>

    <!-- Stats cards -->
    <div id="statsGrid" class="stats-grid hidden">
      <div class="stat-card">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card stat-danger">
        <span class="stat-value" id="statBroken">0</span>
        <span class="stat-label">Broken</span>
      </div>
      <div class="stat-card stat-warning">
        <span class="stat-value" id="statRedirects">0</span>
        <span class="stat-label">Redirects</span>
      </div>
      <div class="stat-card stat-success">
        <span class="stat-value" id="statSuccessRate">—</span>
        <span class="stat-label">Success</span>
      </div>
    </div>

    <!-- Filter tabs -->
    <div id="filterTabs" class="filter-tabs hidden">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="broken">Broken</button>
      <button class="filter-tab" data-filter="redirect">Redirects</button>
      <button class="filter-tab" data-filter="slow">Slow</button>
      <button class="filter-tab" data-filter="image">Images</button>
      <button class="filter-tab" data-filter="external">External</button>
    </div>

    <!-- Results table -->
    <div id="resultsWrap" class="results-wrap">
      <div id="emptyState" class="empty-state">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/>
          <path d="M16 24h16M24 16v16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Click <strong>Scan Page</strong> to begin</p>
      </div>
      <div id="resultsList" class="results-list hidden"></div>
    </div>

    <!-- Export row -->
    <div id="exportRow" class="export-row hidden">
      <span class="export-label">Export:</span>
      <button id="exportCSV" class="export-btn">CSV</button>
      <button id="exportJSON" class="export-btn">JSON</button>
      <button id="exportTXT" class="export-btn">TXT</button>
      <div class="export-sep"></div>
      <select id="exportFilter" class="export-select">
        <option value="all">All links</option>
        <option value="broken">Broken only</option>
        <option value="redirect">Redirects only</option>
        <option value="live">Live only</option>
      </select>
    </div>

  </div><!-- /view-page -->

  <!-- ══ VIEW: BULK SCAN ══════════════════════════════════════════ -->
  <div id="view-bulk" class="view hidden">
    <div class="bulk-form">
      <label class="field-label" for="bulkUrl">Start URL</label>
      <input id="bulkUrl" class="text-input" type="url" placeholder="https://example.com">
      <div class="bulk-row">
        <div class="bulk-depth-wrap">
          <label class="field-label" for="bulkDepth">Depth</label>
          <select id="bulkDepth" class="select-input">
            <option value="1">1 level</option>
            <option value="2" selected>2 levels</option>
            <option value="3">3 levels</option>
          </select>
        </div>
        <button id="bulkScanBtn" class="btn btn-primary flex-1">Start Bulk Scan</button>
      </div>
    </div>

    <div id="bulkProgress" class="bulk-progress hidden">
      <progress id="bulkProgressFill" class="progress-bar" value="0" max="100"></progress>
      <span id="bulkProgressLabel" class="progress-label">Scanning…</span>
    </div>

    <div id="bulkResults" class="bulk-results hidden"></div>

    <!-- Bulk Export row -->
    <div id="bulkExportRow" class="export-row hidden">
      <span class="export-label">Export:</span>
      <button id="bulkExportCSV" class="export-btn">CSV</button>
      <button id="bulkExportJSON" class="export-btn">JSON</button>
      <button id="bulkExportTXT" class="export-btn">TXT</button>
    </div>
  </div>

  <!-- ══ VIEW: HISTORY ════════════════════════════════════════════ -->
  <div id="view-history" class="view hidden">
    <div class="history-header">
      <span class="history-title">Scan History</span>
      <button id="clearAllHistoryBtn" class="btn-clear-all hidden">Clear All</button>
    </div>
    <div id="historyList" class="history-list">
      <div class="empty-state">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/><path d="M24 14v10l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <p>No scans recorded yet</p>
      </div>
    </div>
  </div>

  <!-- ── Status bar ──────────────────────────────────────────────── -->
  <footer class="status-bar">
    <span id="statusDot" class="status-dot status-ready"></span>
    <span id="statusText" class="status-text">Ready</span>
  </footer>

</div><!-- /app -->

<script src="dropdown.js"></script>
<script src="popup.js"></script>
</body>
</html>
