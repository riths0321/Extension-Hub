<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatFont</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <img src="images/logo.svg" alt="WhatFont" class="logo" />
      <div>
        <h1>WhatFont</h1>
        <p>Identify fonts on the current page</p>
      </div>
    </header>

    <section class="panel status-panel">
      <div>
        <p class="label">Current tab</p>
        <p id="tabInfo" class="value">Loading...</p>
      </div>
      <div id="statusBadge" class="badge">Inactive</div>
    </section>

    <section class="panel">
      <h2>Detection</h2>
      <div class="row between">
        <label for="toggleHover" class="label-inline">Enable font detection</label>
        <label class="switch">
          <input type="checkbox" id="toggleHover">
          <span class="slider"></span>
        </label>
      </div>

      <div class="modes" id="modeGroup">
        <button type="button" class="mode-btn active" data-mode="hover">Hover</button>
        <button type="button" class="mode-btn" data-mode="click">Click</button>
        <button type="button" class="mode-btn" data-mode="scan">Scan</button>
      </div>
    </section>

    <section class="panel">
      <h2>Settings</h2>
      <div class="settings-grid">
        <label><input type="checkbox" id="showDownload" checked> Show Google Fonts link</label>
        <label><input type="checkbox" id="showCSS" checked> Show CSS snippet</label>
        <label><input type="checkbox" id="highlightText"> Highlight selected text</label>
      </div>
      <div class="row between">
        <label for="panelPosition">Panel position</label>
        <select id="panelPosition">
          <option value="top-right">Top Right</option>
          <option value="top-left">Top Left</option>
          <option value="bottom-right">Bottom Right</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="follow">Follow Mouse</option>
        </select>
      </div>
    </section>

    <section class="panel" id="detectedPanel">
      <div class="row between">
        <h2>Detected Fonts</h2>
        <button type="button" id="clearBtn" class="text-btn">Clear</button>
      </div>
      <div id="fontsList" class="fonts-list"></div>
    </section>

    <section class="panel hidden" id="detailsPanel">
      <div class="row between">
        <h2>Font Details</h2>
        <button type="button" id="backBtn" class="text-btn">Back</button>
      </div>
      <div id="currentPreview" class="preview">Aa Bb Cc 123</div>
      <div id="currentDetails" class="details-grid"></div>
    </section>

    <section class="actions">
      <button type="button" id="startBtn" class="btn primary">Start</button>
      <button type="button" id="stopBtn" class="btn secondary" disabled>Stop</button>
    </section>

    <p id="message" class="message">Ready</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
