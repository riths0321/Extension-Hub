<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabMaster Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ══ App Shell ══════════════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <img src="../icons/icon16.png" width="18" height="18" alt="" class="brand-icon">
      <span class="brand-name">TabMaster <span class="brand-accent">Pro</span></span>
    </div>
    <div class="header-stats">
      <span class="stat-pill" id="hdr-total">
        <span class="stat-dot dot-blue"></span>
        <span id="hdr-total-num">–</span> tabs
      </span>
      <span class="stat-pill" id="hdr-sleeping-pill" hidden>
        <span class="stat-dot dot-amber"></span>
        <span id="hdr-sleeping-num">0</span> sleeping
      </span>
    </div>
  </header>

  <!-- Tab Nav -->
  <nav class="tab-nav" role="tablist">
    <button class="nav-btn active" data-tab="tabs"     role="tab" aria-selected="true"  id="nav-tabs">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Tabs
    </button>
    <button class="nav-btn" data-tab="sleep"    role="tab" aria-selected="false" id="nav-sleep">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      Sleep
    </button>
    <button class="nav-btn" data-tab="sessions" role="tab" aria-selected="false" id="nav-sessions">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Sessions
    </button>
    <button class="nav-btn" data-tab="settings" role="tab" aria-selected="false" id="nav-settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
  </nav>

  <!-- ══ PANEL: Tabs ══════════════════════════════════════════════ -->
  <section id="panel-tabs" class="panel active" role="tabpanel">
    <div class="tabs-toolbar">
      <!-- Search + sort bar -->
      <div class="panel-toolbar tabs-panel-toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="tab-search" type="search" class="search-input" placeholder="Search tabs…" autocomplete="off" spellcheck="false">
        </div>
        <select id="tab-sort" class="select-sm" aria-label="Sort tabs">
          <option value="index">Order</option>
          <option value="title">A–Z</option>
          <option value="domain">Domain</option>
          <option value="recent">Recent</option>
        </select>
      </div>

      <!-- Filter chips -->
      <div class="chip-row chip-row-tabs" id="tab-filters">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="pinned">Pinned</button>
        <button class="chip" data-filter="audible">Audio</button>
        <button class="chip" data-filter="sleeping">Sleeping</button>
        <button class="chip" data-filter="duplicate">Dupes</button>
      </div>

      <!-- Quick action strip -->
      <div class="action-strip action-strip-tabs">
        <button class="strip-btn" id="btn-close-dupes" title="Close duplicate tabs">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          Close dupes
        </button>
        <button class="strip-btn" id="btn-group-domain" title="Group by domain">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8"/></svg>
          Group domain
        </button>
        <button class="strip-btn" id="btn-sleep-selected" title="Sleep selected tabs" hidden>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Sleep sel.
        </button>
        <button class="strip-btn strip-btn-danger" id="btn-close-selected" title="Close selected tabs" hidden>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          Close sel.
        </button>
      </div>

      <!-- Selection bar -->
      <div class="selection-bar selection-bar-tabs" id="selection-bar" hidden>
        <label class="sel-check-wrap">
          <input type="checkbox" id="select-all-cb" aria-label="Select all">
          <span class="sel-count" id="sel-count-label">0 selected</span>
        </label>
        <button class="link-btn" id="btn-clear-sel">Clear</button>
      </div>
    </div>

    <!-- Tabs list -->
    <div id="tabs-list" class="scroll-area tabs-list" role="list">
      <div class="skeleton-list" id="tabs-skeleton">
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
      </div>
    </div>

  </section>

  <!-- ══ PANEL: Sleep ════════════════════════════════════════════ -->
  <section id="panel-sleep" class="panel" role="tabpanel" hidden>
    <div class="sleep-toolbar">
      <!-- Sleep stats cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-value" id="sleep-active-num">–</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card stat-card-accent">
          <div class="stat-value" id="sleep-sleeping-num">–</div>
          <div class="stat-label">Sleeping</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="sleep-memory-num">–</div>
          <div class="stat-label">MB saved</div>
        </div>
      </div>

      <!-- Sleep controls -->
      <div class="section-block sleep-card">
        <div class="section-label section-label-card">Sleep timer</div>
        <div class="timer-pills" id="timer-pills">
          <button class="timer-pill" data-minutes="5">5m</button>
          <button class="timer-pill active" data-minutes="15">15m</button>
          <button class="timer-pill" data-minutes="30">30m</button>
          <button class="timer-pill" data-minutes="60">1h</button>
        </div>
      </div>

      <!-- Toggle options -->
      <div class="section-block sleep-card">
        <div class="section-label section-label-card">Ignore & automation</div>
        <div class="toggle-list">
          <label class="toggle-row">
            <span class="toggle-label">Pinned tabs</span>
            <div class="toggle-switch">
              <input type="checkbox" id="sleep-ignore-pinned" checked>
              <span class="toggle-track"></span>
            </div>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Tabs playing audio</span>
            <div class="toggle-switch">
              <input type="checkbox" id="sleep-ignore-audio" checked>
              <span class="toggle-track"></span>
            </div>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Battery saver (halve timer)</span>
            <div class="toggle-switch">
              <input type="checkbox" id="sleep-battery" checked>
              <span class="toggle-track"></span>
            </div>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Auto-sleep enabled</span>
            <div class="toggle-switch">
              <input type="checkbox" id="sleep-enabled" checked>
              <span class="toggle-track"></span>
            </div>
          </label>
        </div>
      </div>

      <!-- Sleep actions -->
      <div class="btn-row sleep-actions">
        <button class="btn btn-primary" id="btn-sleep-all">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Sleep inactive
        </button>
        <button class="btn btn-outline" id="btn-wake-all">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          Wake all
        </button>
      </div>
    </div>

    <!-- Sleep tab list -->
    <div class="sleep-list-section">
      <div class="section-label section-label-spaced">Tab sleep states</div>
      <div id="sleep-tabs-list" class="scroll-area scroll-area-sm sleep-list" role="list"></div>
    </div>

  </section>

  <!-- ══ PANEL: Sessions ════════════════════════════════════════ -->
  <section id="panel-sessions" class="panel" role="tabpanel" hidden>
    <div class="sessions-toolbar">
      <!-- Save row -->
      <div class="save-row">
        <input id="session-name-input" type="text" class="field-input" placeholder="Session name…" maxlength="60">
        <button class="btn btn-primary" id="btn-save-session">Save</button>
      </div>

      <!-- Mode chips -->
      <div class="chip-row chip-row-sessions">
        <button class="chip active" data-mode="custom">Custom</button>
        <button class="chip" data-mode="work">Work</button>
        <button class="chip" data-mode="study">Study</button>
        <button class="chip" data-mode="personal">Personal</button>
        <button class="chip" data-mode="research">Research</button>
      </div>

      <!-- Sessions search -->
      <div class="search-wrap search-wrap-sessions">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="sessions-search" type="search" class="search-input" placeholder="Search sessions…" autocomplete="off">
      </div>
    </div>

    <!-- Sessions list -->
    <div id="sessions-list" class="scroll-area" role="list">
      <div class="empty-state" id="sessions-empty" hidden>
        <div class="empty-icon">📦</div>
        <div class="empty-msg">No saved sessions</div>
        <div class="empty-sub">Type a name above and hit Save</div>
      </div>
    </div>

  </section>

  <!-- ══ PANEL: Settings ════════════════════════════════════════ -->
  <section id="panel-settings" class="panel" role="tabpanel" hidden>
    <div class="settings-scroll">

      <div class="settings-group settings-card">
        <div class="settings-group-label">Sessions</div>
        <label class="toggle-row">
          <span class="toggle-label">Auto-snapshot before restore</span>
          <div class="toggle-switch"><input type="checkbox" id="s-autosave"><span class="toggle-track"></span></div>
        </label>
        <label class="toggle-row">
          <span class="toggle-label">Preserve pinned tabs on restore</span>
          <div class="toggle-switch"><input type="checkbox" id="s-preserve-pinned" checked><span class="toggle-track"></span></div>
        </label>
        <label class="toggle-row">
          <span class="toggle-label">Confirm before restoring</span>
          <div class="toggle-switch"><input type="checkbox" id="s-confirm-restore" checked><span class="toggle-track"></span></div>
        </label>
        <div class="setting-row">
          <label class="setting-label" for="s-max-sessions">Max saved sessions</label>
          <input type="number" id="s-max-sessions" class="field-input field-input-sm" min="1" max="200" value="50">
        </div>
      </div>

      <div class="settings-group settings-card">
        <div class="settings-group-label">Badge</div>
        <label class="toggle-row">
          <span class="toggle-label">Show sleeping tab count on icon</span>
          <div class="toggle-switch"><input type="checkbox" id="s-badge" checked><span class="toggle-track"></span></div>
        </label>
      </div>

      <div class="settings-group settings-card settings-card-danger">
        <div class="settings-group-label">Danger zone</div>
        <button class="btn btn-danger-outline btn-full" id="btn-clear-sessions">Clear all sessions</button>
      </div>

      <div class="settings-actions">
        <button class="btn btn-primary btn-full" id="btn-save-settings">Save settings</button>
      </div>

    </div>
  </section>

</div><!-- /#app -->

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- Confirm Dialog -->
<div id="confirm-dialog" class="dialog-overlay" hidden>
  <div class="dialog-box">
    <p class="dialog-msg" id="confirm-msg">Are you sure?</p>
    <div class="dialog-actions">
      <button class="btn btn-ghost btn-sm" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<script src="../utils/helpers.js"></script>
<script src="dropdowns.js"></script>
<script src="popup.js"></script>
</body>
</html>
