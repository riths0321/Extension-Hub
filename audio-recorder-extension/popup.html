<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Audio Recorder</h1>
      <p class="subtitle">Record active tab audio without muting playback</p>
    </header>

    <section class="status-card" aria-live="polite">
      <div id="status" class="status status-ready">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text">Ready</span>
      </div>
      <div id="timer" class="timer">00:00:00</div>
      <div class="level-wrapper" aria-label="Recording level meter">
        <div class="level-track">
          <div id="levelFill" class="level-fill"></div>
        </div>
        <p class="level-label">Live audio level</p>
      </div>
    </section>

    <section class="tab-card">
      <p class="card-label">Current tab</p>
      <p id="currentTab" class="tab-name">Loading...</p>
    </section>

    <section class="actions">
      <button id="startBtn" class="btn btn-start" type="button">Start Recording</button>
      <button id="stopBtn" class="btn btn-stop" type="button" disabled>Stop Recording</button>
    </section>

    <section class="tips">
      <p>Keep media playing in the active tab for best results.</p>
      <p>Audio remains audible while recording is active.</p>
    </section>

    <section class="history-card">
      <div class="history-header">
        <h2>Recent Recordings</h2>
        <button id="clearHistoryBtn" class="btn-link" type="button">Clear</button>
      </div>
      <div id="historyList" class="history-list">
        <p class="empty-history">No recordings yet</p>
      </div>
    </section>
  </main>

  <div id="notificationContainer" class="notification-container" aria-live="polite"></div>
  <script src="popup.js"></script>
</body>
</html>
