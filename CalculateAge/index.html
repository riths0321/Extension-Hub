<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="logo.png" type="image/png" />
  </head>

  <body>
    <div class="bg-glow"></div>
    <div class="container">
      <header>
        <div class="header-left">
          <div class="icon-pulse">
            <img
              src="logo.png"
              alt="Age Calculator Logo"
              width="28"
              height="28"
              style="object-fit: contain"
            />
          </div>
          <div class="header-text">
            <h1>Age Calculator</h1>
            <p>Precision age tracking</p>
          </div>
        </div>
        <div class="header-actions">
          <button
            id="theme-toggle"
            class="icon-btn theme-toggle"
            aria-label="Toggle theme"
          >
            🌙
          </button>
        </div>
      </header>

      <main>
        <div class="input-card">
          <label for="birthdate">Date of Birth</label>
          <div class="input-wrapper">
            <input type="date" id="birthdate" required />
            <div class="input-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
              </svg>
            </div>
          </div>
        </div>

        <button id="calculate-btn" class="primary-btn" style="width: 100%">
          <span>Calculate Age</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>

        <div id="result-container" class="result-grid hidden">
          <div class="result-item primary">
            <span class="label">Years</span>
            <span class="value" id="years" data-value="0">0</span>
          </div>
          <div class="result-item secondary">
            <span class="label">Months</span>
            <span class="value" id="months" data-value="0">0</span>
          </div>
          <div class="result-item secondary">
            <span class="label">Days</span>
            <span class="value" id="days" data-value="0">0</span>
          </div>
        </div>

        <div id="next-birthday-container" class="next-bday-card hidden">
          <div class="bday-icon">🎂</div>
          <div class="bday-text">
            <span>Next Birthday in</span>
            <strong id="next-bday-countdown">0 days</strong>
          </div>
        </div>

        <!-- Timeline Visualization -->
        <div id="timeline-container" class="timeline-card hidden">
          <div class="timeline-header">
            <span class="label">Life Timeline</span>
            <span class="life-stage" id="life-stage">Adult</span>
          </div>
          <div class="timeline-bar">
            <div id="timeline-progress" class="timeline-progress"></div>
          </div>
          <div id="milestone-markers" class="milestone-markers"></div>
        </div>

        <!-- Detailed Statistics -->
        <div id="detailed-stats" class="stats-card hidden">
          <h3>📊 Age Analytics</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-label">Zodiac Sign</span>
              <span class="stat-value" id="zodiac-sign">-</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Generation</span>
              <span class="stat-value" id="generation">-</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Born on</span>
              <span class="stat-value" id="day-of-week">-</span>
            </div>
          </div>

          <h3 style="margin-top: 16px">⏱️ Time Breakdown</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-label">Total Days</span>
              <span class="stat-value" id="total-days">-</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Total Weeks</span>
              <span class="stat-value" id="total-weeks">-</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Total Hours</span>
              <span class="stat-value" id="total-hours">-</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Total Minutes</span>
              <span class="stat-value" id="total-minutes">-</span>
            </div>
          </div>
        </div>

        <!-- Profiles Section -->
        <div class="profiles-section">
          <div class="section-header">
            <h3>Saved Profiles</h3>
            <div class="profile-actions">
              <button
                id="save-profile"
                class="icon-btn small"
                aria-label="Save current"
                title="Save current profile"
              >
                💾
              </button>
              <button
                id="compare-btn"
                class="icon-btn small"
                aria-label="Compare profiles"
                title="Compare profiles"
              >
                🔄
              </button>
              <button
                id="share-btn"
                class="icon-btn small"
                aria-label="Share results"
                title="Share results"
              >
                📤
              </button>
            </div>
          </div>
          <div id="profiles-list" class="profiles-list"></div>
        </div>

        <div id="error-message" class="error-msg hidden"></div>
      </main>

      <footer class="copyright">
        <span>© 2024 Anslation Company</span>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
