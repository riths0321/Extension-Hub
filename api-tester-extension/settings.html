<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester Pro Settings</title>
    <link rel="stylesheet" href="themes.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="app-shell settings-shell">
        <header class="glass-panel topbar">
            <div class="brand">
                <h1 class="brand-title">API Tester Pro Settings</h1>
                <p class="brand-subtitle">Personalize theme, history, formatting and request timeouts.</p>
            </div>
            <div class="topbar-actions">
                <button id="openWorkspace" class="secondary-button">Workspace</button>
                <button id="saveSettings" class="primary-button">Save</button>
            </div>
        </header>

        <main class="grid-layout settings-grid">
            <section class="glass-panel section-card">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Appearance</h2>
                        <p class="section-copy">Developer-friendly themes and view behavior.</p>
                    </div>
                </div>
                <div class="stack">
                    <div class="field">
                        <label class="field-label" for="theme">Theme</label>
                        <select id="theme" class="select">
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                    <label class="toggle-row">
                        <input id="autoFormat" type="checkbox">
                        <span>Auto-format JSON and XML responses</span>
                    </label>
                    <label class="toggle-row">
                        <input id="autoCopy" type="checkbox">
                        <span>Auto-copy successful responses</span>
                    </label>
                </div>
            </section>

            <section class="glass-panel section-card">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Request Defaults</h2>
                        <p class="section-copy">Set sensible defaults for faster testing.</p>
                    </div>
                </div>
                <div class="stack">
                    <div class="field">
                        <label class="field-label" for="defaultContentType">Default content type</label>
                        <select id="defaultContentType" class="select">
                            <option value="application/json">application/json</option>
                            <option value="text/plain">text/plain</option>
                            <option value="application/x-www-form-urlencoded">application/x-www-form-urlencoded</option>
                        </select>
                    </div>
                    <div class="field">
                        <label class="field-label" for="requestTimeout">Request timeout (seconds)</label>
                        <input id="requestTimeout" class="input" type="number" min="5" max="300">
                    </div>
                    <div class="field">
                        <label class="field-label" for="historyLimit">History limit</label>
                        <input id="historyLimit" class="input" type="number" min="10" max="500">
                    </div>
                    <label class="toggle-row">
                        <input id="safeMode" type="checkbox">
                        <span>Safe mode: prefer secure protocols and stricter request checks</span>
                    </label>
                    <label class="toggle-row">
                        <input id="allowPrivateNetwork" type="checkbox">
                        <span>Allow localhost and private/internal network APIs</span>
                    </label>
                    <label class="toggle-row">
                        <input id="enableBackgroundSchedules" type="checkbox">
                        <span>Enable scheduled background requests</span>
                    </label>
                </div>
            </section>

            <section class="glass-panel section-card">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Maintenance</h2>
                        <p class="section-copy">Reset settings without touching your saved collections.</p>
                    </div>
                </div>
                <div class="button-row">
                    <button id="resetSettings" class="danger-button">Reset settings</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="settings.js"></script>
</body>
</html>
