<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester Pro</title>
    <link rel="stylesheet" href="themes.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup-root">

    <!-- ── Header ── -->
    <div class="p-header">
        <div class="p-logo">
            <div class="p-logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <div class="p-logo-text">
                <div class="p-app-name">API Tester Pro</div>
                <div class="p-app-version">v2.0 · Professional</div>
            </div>
        </div>
        <div class="p-header-actions">
            <button id="toggleTheme" class="p-icon-btn" title="Toggle theme" aria-label="Toggle theme">
                <span id="themeIcon">☾</span>
            </button>
            <button id="openSettings" class="p-icon-btn" title="Settings" aria-label="Settings">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- ── Primary CTA ── -->
    <button id="openWorkspace" class="p-cta">
        <div class="p-cta-left">
            <div class="p-cta-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8M12 17v4"/>
                </svg>
            </div>
            <div class="p-cta-text">
                <div class="p-cta-label">Open Workspace</div>
                <div class="p-cta-sub">Full API testing environment</div>
            </div>
        </div>
        <div class="p-cta-arrow">→</div>
    </button>

    <!-- ── Quick Actions ── -->
    <div class="p-actions">
        <button id="loadStarter" class="p-action-btn">
            <span class="p-action-icon">⚡</span>
            <span>Load Starter</span>
        </button>
        <button id="newRequest" class="p-action-btn">
            <span class="p-action-icon">✦</span>
            <span>New Request</span>
        </button>
    </div>

    <!-- ── How It Works ── -->
    <div class="p-steps-card">
        <div class="p-steps-title">How It Works</div>
        <div class="p-steps">
            <div class="p-step">
                <div class="p-step-num">1</div>
                <div class="p-step-info">
                    <div class="p-step-name">Open Workspace</div>
                    <div class="p-step-desc">Launch the full testing environment</div>
                </div>
            </div>
            <div class="p-step">
                <div class="p-step-num">2</div>
                <div class="p-step-info">
                    <div class="p-step-name">Build &amp; Send</div>
                    <div class="p-step-desc">Set method, URL, headers, auth &amp; body</div>
                </div>
            </div>
            <div class="p-step">
                <div class="p-step-num">3</div>
                <div class="p-step-info">
                    <div class="p-step-name">Inspect Response</div>
                    <div class="p-step-desc">Pretty view, assertions, snippets &amp; history</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Recent Requests ── -->
    <div class="p-recent-card">
        <div class="p-recent-header">
            <div class="p-recent-title">Recent Requests</div>
            <div id="recentCount" class="p-recent-count hidden">0</div>
        </div>
        <div id="recentList">
            <div class="p-empty">No recent requests yet</div>
        </div>
    </div>

</div>
<script type="module" src="popup.js"></script>
</body>
</html>
