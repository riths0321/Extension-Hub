<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Code Previewer Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="app">

    <!-- ── HEADER ── -->
    <header>
        <div class="header-brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M6 7L2 10L6 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 7L18 10L14 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 4L8 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-name">Code Previewer</h1>
          <p class="brand-sub">HTML · CSS</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="autoRunBtn" class="icon-btn auto-run-btn active" title="Toggle Auto-run (Ctrl+Enter to run)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 4.5L9.5 7L5.5 9.5V4.5Z" fill="currentColor"/></svg>
          <span>Auto</span>
        </button>
        <button id="darkModeBtn" class="icon-btn" title="Toggle Dark Mode">
          <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
      </div>
    </header>

    <!-- ── EDITOR PANEL ── -->
    <section class="editor-panel">

      <!-- Tab row -->
      <div class="tabs-bar">
        <div class="code-tabs">
          <button class="code-tab active" data-type="html">
            <span class="tab-dot html-dot"></span>HTML
          </button>
          <button class="code-tab" data-type="css">
            <span class="tab-dot css-dot"></span>CSS
          </button>
        </div>
        <div class="tab-tools">
          <div class="dropdown-wrap">
            <button class="tool-btn" id="templatesBtn">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="7" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="7" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="7" y="7" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
              Templates
            </button>
            <div class="dropdown" id="templateMenu">
              <div class="dropdown-label">Starters</div>
              <button class="dropdown-item" data-tpl="boilerplate">
                <span class="tpl-icon">Base</span>HTML Boilerplate
              </button>
              <button class="dropdown-item" data-tpl="card">
                <span class="tpl-icon">UI</span>Card Component
              </button>
              <button class="dropdown-item" data-tpl="flexbox">
                <span class="tpl-icon">Lay</span>Flexbox Layout
              </button>
              <button class="dropdown-item" data-tpl="animation">
                <span class="tpl-icon">FX</span>CSS Animation
              </button>
            </div>
          </div>
          <button class="tool-btn" id="formatBtn" title="Format Code">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 3H12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M1 6.5H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M1 10H10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Format
          </button>
          <button class="tool-btn" id="copyBtn" title="Copy Code">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M9 4V2.5C9 1.67 8.33 1 7.5 1H2.5C1.67 1 1 1.67 1 2.5V7.5C1 8.33 1.67 9 2.5 9H4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Copy
          </button>
        </div>
      </div>

      <!-- Editor with line numbers -->
      <div class="editor-wrap" id="editorWrap">
        <div class="line-numbers" id="lineNumbers">
          <span>1</span>
        </div>
        <textarea
          id="editor"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          placeholder="// Start coding..."></textarea>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-left">
          <span id="langBadge" class="lang-badge">HTML</span>
          <span id="lineCount" class="status-item">1 line</span>
          <span id="charCount" class="status-item">0 chars</span>
        </div>
        <div class="status-right">
          <span id="saveStatus" class="save-dot saved">● Saved</span>
          <span class="shortcut-hint">Ctrl+Enter to run</span>
        </div>
      </div>
    </section>

    <!-- ── CONTROLS ── -->
    <div class="controls-bar">
      <button id="runBtn" class="btn-primary">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 1.5L10 6L2 10.5V1.5Z" fill="white"/></svg>
        Run
      </button>
      <button id="exportBtn" class="btn-secondary">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1V8M6 8L3.5 5.5M6 8L8.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 9.5V10.5C1 11.05 1.45 11.5 2 11.5H10C10.55 11.5 11 11.05 11 10.5V9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Export
      </button>
      <button id="clearBtn" class="btn-ghost">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Clear
      </button>
      <button id="fullscreenBtn" class="btn-icon" title="Open in full window">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 5V2C1 1.45 1.45 1 2 1H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 1H12C12.55 1 13 1.45 13 2V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13 9V12C13 12.55 12.55 13 12 13H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 13H2C1.45 13 1 12.55 1 12V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- ── PREVIEW ── -->
    <section class="preview-panel">
      <div class="preview-header">
        <div class="preview-label">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M6 4V6.5L8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Live Preview
        </div>
        <div class="preview-size-btns">
          <button class="size-btn active" data-size="full" title="Full width">
            <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><rect x="0.75" y="0.75" width="11.5" height="9.5" rx="1.25" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="size-btn" data-size="tablet" title="Tablet (768px)">
            <svg width="11" height="13" viewBox="0 0 11 13" fill="none"><rect x="0.75" y="0.75" width="9.5" height="11.5" rx="1.25" stroke="currentColor" stroke-width="1.5"/><line x1="5.5" y1="10.5" x2="5.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button class="size-btn" data-size="mobile" title="Mobile (375px)">
            <svg width="9" height="13" viewBox="0 0 9 13" fill="none"><rect x="0.75" y="0.75" width="7.5" height="11.5" rx="1.25" stroke="currentColor" stroke-width="1.5"/><line x1="4.5" y1="10.5" x2="4.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="preview-frame-wrap" id="previewWrap">
        <iframe id="preview" sandbox="allow-scripts allow-modals allow-forms"></iframe>
      </div>
    </section>

    <!-- Toast notification -->
    <div id="toast" class="toast">Copied!</div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
