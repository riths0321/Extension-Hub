<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="2"/>
          <line x1="13" y1="13" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand">Quick Search</div>
        <div class="tagline">Select text · Search anywhere</div>
      </div>
    </div>
    <div class="shortcut-pill">Ctrl+Shift+S</div>
  </header>

  <!-- ── Tabs ── -->
  <nav class="tabs">
    <button class="tab active" data-tab="home">Home</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="custom">Custom</button>
  </nav>

  <!-- ═══════ HOME TAB ═══════ -->
  <div class="tab-panel active" id="panel-home">

    <div class="how-section">
      <p class="how-title">How it works</p>
      <div class="steps">
        <div class="step">
          <span class="step-num">1</span>
          <span class="step-text">Select text on any page</span>
        </div>
        <div class="step">
          <span class="step-num">2</span>
          <span class="step-text">Popup appears automatically</span>
        </div>
        <div class="step">
          <span class="step-num">3</span>
          <span class="step-text">Click an engine to search</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <p class="section-label">Search Engines</p>
    <div class="engine-grid" id="homeEngineGrid">
      <!-- Injected by popup.js -->
    </div>

  </div>

  <!-- ═══════ HISTORY TAB ═══════ -->
  <div class="tab-panel" id="panel-history">
    <div class="panel-header">
      <p class="section-label" style="margin:0">Recent Searches</p>
      <button class="btn-ghost" id="clearHistoryBtn">Clear all</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">No recent searches yet</div>
    </div>
  </div>

  <!-- ═══════ CUSTOM TAB ═══════ -->
  <div class="tab-panel" id="panel-custom">
    <p class="section-label">Add Custom Engine</p>
    <div class="form-card">
      <div class="field">
        <label class="field-label" for="engineName">Engine Name</label>
        <input class="field-input" type="text" id="engineName" placeholder="e.g. Netflix" autocomplete="off" />
      </div>
      <div class="field">
        <label class="field-label" for="engineUrl">Search URL <span class="field-hint">(use %s as placeholder)</span></label>
        <input class="field-input" type="text" id="engineUrl" placeholder="https://example.com/search?q=%s" autocomplete="off" />
      </div>
      <div class="form-actions">
        <button class="btn-secondary" id="testCustomBtn">Test</button>
        <button class="btn-primary" id="addCustomEngineBtn">Add Engine</button>
      </div>
    </div>

    <div class="panel-header" style="margin-top:18px">
      <p class="section-label" style="margin:0">Your Engines</p>
    </div>
    <div class="custom-list" id="customEnginesList">
      <div class="empty-state">No custom engines yet</div>
    </div>
  </div>

</div>

<script src="popup.js"></script>

</body>
</html>
