<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Toolkit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <span class="icon">💼</span>
        <h1>Career Toolkit</h1>
      </div>
      <p class="subtitle">Analyze Resume & Generate Cover Letter</p>
    </header>

    <div class="inputs-section">
      <div class="section-actions">
        <h3>Inputs</h3>
        <button id="extractBtn" class="btn-secondary" title="Extract from current page">🌐 Auto-Extract</button>
      </div>
      <div class="input-group">
        <label for="jobDescription">Job Description</label>
        <textarea id="jobDescription" placeholder="Paste the job description here..."></textarea>
      </div>
      <div class="input-group">
        <label for="resumeText">Resume Text</label>
        <textarea id="resumeText" placeholder="Paste your resume text here..."></textarea>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-target="resume-tab">📊 Resume Match</button>
      <button class="tab-btn" data-target="cover-letter-tab">📝 Cover Letter</button>
    </div>

    <!-- Resume Match Tab -->
    <div id="resume-tab" class="tab-content active">
      <button id="analyzeResumeBtn" class="btn-primary full-width">Analyze Resume Match</button>
      
      <div id="resumeResults" class="results-container hidden">
        <div class="score-header">
          <div class="score-circle">
            <span id="atsScore">0</span>%
          </div>
          <div class="score-text">ATS Compatibility Score</div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h4>✅ Found Keywords</h4>
            <ul id="foundKeywords" class="keyword-list good"></ul>
          </div>
          <div class="card">
            <h4>❌ Missing Keywords</h4>
            <ul id="missingKeywords" class="keyword-list bad"></ul>
          </div>
        </div>

        <div class="card">
          <h4>💡 Suggested Bullets</h4>
          <div id="suggestedBullets" class="suggestions-text"></div>
        </div>

        <div class="card">
          <h4>📈 Role Fit Summary</h4>
          <p id="roleFitSummary" class="role-fit-text"></p>
        </div>

        <button id="exportResumeBtn" class="btn-secondary full-width mt-2">📥 Export ATS Report</button>
      </div>
    </div>

    <!-- Cover Letter Tab -->
    <div id="cover-letter-tab" class="tab-content">
      <div class="options-row">
        <div class="input-group">
          <label for="toneSelect">Tone</label>
          <select id="toneSelect">
            <option value="formal">Formal</option>
            <option value="confident">Confident</option>
            <option value="conversational">Conversational</option>
            <option value="creative">Creative</option>
          </select>
        </div>
        <div class="input-group">
          <label for="structureSelect">Structure</label>
          <select id="structureSelect">
            <option value="classic">Classic (Standard)</option>
            <option value="problem-solution">Problem-Solution</option>
            <option value="story-driven">Story-Driven</option>
          </select>
        </div>
      </div>
      
      <button id="generateLetterBtn" class="btn-primary full-width">Generate Cover Letter</button>
      
      <div id="coverLetterResults" class="results-container hidden">
        <div class="letter-actions">
          <button id="copyLetterBtn" class="btn-small">📋 Copy</button>
          <button id="exportLetterBtn" class="btn-small">📥 Export</button>
          <button id="companyResearchBtn" class="btn-small" title="Copy an AI prompt to research the company">🔍 Research Prompt</button>
        </div>
        <textarea id="coverLetterOutput" class="letter-textarea" readonly></textarea>
      </div>
    </div>

    <div id="statusMessage" class="status-message hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
