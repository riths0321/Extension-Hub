<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Toolkit</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="blob-bg"></div>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="accent-icon"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
        <h1>Career Toolkit</h1>
      </div>
      <p class="subtitle">AI-Powered Applicant Studio</p>
    </header>

    <div class="glass-panel inputs-section">
      <div class="section-actions">
        <h3>Source Data</h3>
        <button id="extractBtn" class="btn-ghost" title="Extract from current page">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
          Auto-Extract
        </button>
      </div>
      <div class="input-grid">
        <div class="input-group">
          <label for="jobDescription">Job Description</label>
          <textarea id="jobDescription" placeholder="Paste target job requirements..."></textarea>
        </div>
        <div class="input-group">
          <label for="resumeText">Resume Profile</label>
          <textarea id="resumeText" placeholder="Paste your resume content..."></textarea>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-target="resume-tab">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        ATS Match
      </button>
      <button class="tab-btn" data-target="cover-letter-tab">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Cover Letter
      </button>
    </div>

    <!-- Resume Match Tab -->
    <div id="resume-tab" class="tab-content active">
      <button id="analyzeResumeBtn" class="btn-primary full-width shimmer-btn">
        <span>Analyze Match Profile</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      </button>
      
      <div id="resumeResults" class="results-container hidden">
        <div class="score-header glass-panel">
          <div class="score-circle">
            <svg class="progress-ring" width="80" height="80">
              <circle class="progress-ring__circle" stroke="currentColor" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
            </svg>
            <div class="score-value"><span id="atsScore">0</span>%</div>
          </div>
          <div class="score-text">
            <h4>Compatibility Score</h4>
            <p>Based on contextual AI analysis</p>
          </div>
        </div>

        <div class="grid-2">
          <div class="glass-card">
            <h4 class="good-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              Matched Keywords
            </h4>
            <ul id="foundKeywords" class="keyword-list good"></ul>
          </div>
          <div class="glass-card">
            <h4 class="bad-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
              Missing Keywords
            </h4>
            <ul id="missingKeywords" class="keyword-list bad"></ul>
          </div>
        </div>

        <div class="glass-card">
          <h4 class="info-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            AI Suggestions
          </h4>
          <div id="suggestedBullets" class="content-text"></div>
        </div>

        <div class="glass-card">
          <h4 class="info-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Role Fit Analysis
          </h4>
          <p id="roleFitSummary" class="content-text"></p>
        </div>

        <button id="exportResumeBtn" class="btn-outline full-width mt-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Export ATS Report
        </button>
      </div>
    </div>

    <!-- Cover Letter Tab -->
    <div id="cover-letter-tab" class="tab-content">
      <div class="options-row mb-3">
        <div class="input-group">
          <label for="toneSelect">Narrative Tone</label>
          <div class="select-wrapper">
            <select id="toneSelect">
              <option value="formal">Formal & Professional</option>
              <option value="confident">Bold & Confident</option>
              <option value="conversational">Warm & Conversational</option>
              <option value="creative">Creative & Unique</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label for="structureSelect">Letter Structure</label>
          <div class="select-wrapper">
            <select id="structureSelect">
              <option value="classic">Classic (Standard)</option>
              <option value="problem-solution">Problem-Solution Focus</option>
              <option value="story-driven">Story-Driven Journey</option>
            </select>
          </div>
        </div>
      </div>
      
      <button id="generateLetterBtn" class="btn-primary full-width shimmer-btn">
        <span>Draft Cover Letter</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
      </button>
      
      <div id="coverLetterResults" class="results-container hidden">
        <div class="action-bar glass-panel mb-2">
          <span class="action-title">Final Output</span>
          <div class="action-group">
            <button id="copyLetterBtn" class="action-icon" title="Copy to Clipboard">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
            <button id="exportLetterBtn" class="action-icon" title="Export as TXT">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
            <div class="divider"></div>
            <button id="companyResearchBtn" class="action-icon tooltip-anchor" title="Copy AI Prompt to research the company">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
          </div>
        </div>
        <textarea id="coverLetterOutput" class="letter-textarea glass-card" readonly></textarea>
      </div>
    </div>

    <!-- Notification Toast -->
    <div id="statusMessage" class="toast hidden">
      <svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      <span id="statusText" class="toast-text"></span>
    </div>

  </div>
    <footer class="popup-footer">
      <a href="privacy.html" target="_blank" class="footer-link">Privacy Policy</a>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
