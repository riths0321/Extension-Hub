<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Link Manager</title>

  <!-- Local Styles Only -->
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body data-theme="sky-gradient">
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>🔗 Link Manager</h1>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      🔍
      <input type="text" id="searchInput" placeholder="Search links..." />
      <button id="clearSearch" class="icon-btn">✖</button>
    </div>

    <!-- Links Container -->
    <div class="links-container"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state">
      ➕
      <h3>No links added yet</h3>
      <p>Click "Add Current Page" to add your first link</p>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="addCurrent" class="btn-primary">➕ Add Current Page</button>
      <button id="openAll" class="btn-secondary">🌐 Open All</button>
    </div>

    <!-- Categories -->
    <div class="categories">
      <h3>🏷 Quick Categories</h3>
      <div class="category-tags">
        <button class="category-tag active" data-category="all">All</button>
        <button class="category-tag" data-category="work">Work</button>
        <button class="category-tag" data-category="social">Social</button>
        <button class="category-tag" data-category="shopping">Shopping</button>
        <button class="category-tag" data-category="entertainment">Entertainment</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-item">🔗 <span id="totalLinks">0</span> Links</div>
      <div class="stat-item">📂 <span id="totalCategories">4</span> Categories</div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
