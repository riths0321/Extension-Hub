<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mandala Maker— Studio</title>
  <link rel="stylesheet" href="mandala-canvas.css">
  <link rel="stylesheet" href="../js/dropdowns.css">
  <script src="../js/dropdowns.js" defer></script>
  <script src="../lib/fabric.min.js" defer></script>
  <script src="../utils/mathHelpers.js" defer></script>
  <script src="../services/storageService.js" defer></script>
</head>
<body>
  <div class="app" id="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="2" x2="12" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="16" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="8" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="16" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Mandala Maker</span>
      </div>

      <div class="header-tools">
        <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 20 20" fill="none"><path d="M4 7H13a4 4 0 0 1 0 8H8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7,4 4,7 7,10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Undo</span>
        </button>
        <button class="tool-btn" id="redoBtn" title="Redo (Ctrl+Shift+Z)">
          <svg viewBox="0 0 20 20" fill="none"><path d="M16 7H7a4 4 0 0 0 0 8h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="13,4 16,7 13,10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Redo</span>
        </button>
        <div class="divider-v"></div>
        <button class="tool-btn" id="clearBtn" title="Clear Canvas">
          <svg viewBox="0 0 20 20" fill="none"><path d="M3 6h14M8 6V4h4v2M16 6l-1 11H5L4 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Clear</span>
        </button>
        <button class="tool-btn" id="saveArtworkBtn" title="Save Artwork">
          <svg viewBox="0 0 20 20" fill="none"><path d="M3 4a1 1 0 011-1h10l3 3v10a1 1 0 01-1 1H4a1 1 0 01-1-1V4z" stroke="currentColor" stroke-width="1.6"/><rect x="7" y="12" width="6" height="5" rx="0.5" stroke="currentColor" stroke-width="1.4"/><rect x="6" y="3" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.4"/></svg>
          <span>Save</span>
        </button>
      </div>

      <div class="header-export">
        <div class="export-group">
          <button class="btn-primary" id="exportPNG">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            PNG
          </button>
          <button class="btn-outline" id="exportSVG">SVG</button>
          <button class="btn-outline" id="exportJSON">JSON</button>
        </div>
        <button class="tool-btn icon-only" id="themeToggle" title="Toggle dark mode">
          <svg id="themeIcon" viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zM10 6a4 4 0 010 8V6z" fill="currentColor"/></svg>
        </button>
        <button class="tool-btn icon-only" id="toggleSidebar" title="Toggle sidebar">
          <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="1.5" rx="1" fill="currentColor"/><rect x="3" y="9" width="14" height="1.5" rx="1" fill="currentColor"/><rect x="3" y="13" width="14" height="1.5" rx="1" fill="currentColor"/></svg>
        </button>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="main">

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">

        <!-- CANVAS SETTINGS -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor" opacity=".2"/></svg>
            Canvas
          </div>
          <div class="field">
            <label>Background</label>
            <div class="color-row">
              <input type="color" class="color-swatch" id="backgroundColor" value="#ffffff">
              <div class="preset-colors" id="bgPresets">
                <button class="preset-dot preset-dot-white" data-color="#ffffff" title="White"></button>
                <button class="preset-dot preset-dot-dark" data-color="#111827" title="Dark"></button>
                <button class="preset-dot preset-dot-cream" data-color="#fef9f0" title="Cream"></button>
                <button class="preset-dot preset-dot-ice" data-color="#f0f4ff" title="Ice Blue"></button>
                <button class="preset-dot preset-dot-midnight" data-color="#1a0a2e" title="Midnight"></button>
              </div>
            </div>
          </div>
        </section>

        <!-- SYMMETRY -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 1"/><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 1"/></svg>
            Symmetry
          </div>
          <div class="field">
            <div class="label-row">
              <label>Folds</label>
              <span class="value-tag" id="symmetryValue">6</span>
            </div>
            <input type="range" id="symmetryRange" min="2" max="32" value="6" class="slider">
          </div>
          <div class="field">
            <div class="toggle-row">
              <label>Mirror Drawing</label>
              <label class="toggle">
                <input type="checkbox" id="enableMirroring" checked>
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>
          <div class="field">
            <div class="toggle-row">
              <label>Show Guide Lines</label>
              <label class="toggle">
                <input type="checkbox" id="showGuides" checked>
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>
          <div class="field">
            <label>Center X</label>
            <div class="label-row">
              <input type="range" id="centerX" min="0" max="100" value="50" class="slider">
              <span class="value-tag" id="centerXValue">50</span>
            </div>
          </div>
          <div class="field">
            <label>Center Y</label>
            <div class="label-row">
              <input type="range" id="centerY" min="0" max="100" value="50" class="slider">
              <span class="value-tag" id="centerYValue">50</span>
            </div>
          </div>
          <button class="btn-ghost" id="centerAtTouch">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><line x1="8" y1="1" x2="8" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="8" y1="12" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Set Center by Click
          </button>
        </section>

        <!-- BRUSH -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><path d="M2 14s1-1 3-3l7-7a1.4 1.4 0 00-2-2L3 9c-2 2-1 5-1 5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Brush
          </div>
          <div class="field">
            <label>Type</label>
            <select id="brushType" class="select">
              <option value="round">Round</option>
              <option value="square">Square</option>
              <option value="spray">Spray</option>
            </select>
          </div>
          <div class="field">
            <div class="label-row">
              <label>Size</label>
              <span class="value-tag" id="brushSizeValue">10</span>
            </div>
            <input type="range" id="brushSizeRange" min="1" max="100" value="10" class="slider">
          </div>
          <div class="field">
            <div class="label-row">
              <label>Opacity</label>
              <span class="value-tag" id="brushOpacityValue">100%</span>
            </div>
            <input type="range" id="brushOpacity" min="1" max="100" value="100" class="slider">
          </div>
          <div class="field">
            <label>Color</label>
            <div class="color-row">
              <input type="color" class="color-swatch" id="brushColorPicker" value="#2563EB">
              <button class="btn-ghost small" id="randomColor">
                <svg viewBox="0 0 16 16" fill="none"><path d="M2 2h4l1.5 3L5 8h3l1 2M14 2l-3 3 3 3M8 14l3-3-3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Random
              </button>
            </div>
          </div>
          <!-- Color Palette -->
          <div class="field">
            <div class="label-row">
              <label>Palette</label>
              <button class="btn-ghost tiny" id="genPalette">
                <svg viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                New
              </button>
            </div>
            <div class="palette-row" id="colorPalette"></div>
          </div>
          <div class="field">
            <label>Recent Colors</label>
            <div class="palette-row" id="recentColors"></div>
          </div>
          <div class="field">
            <div class="toggle-row">
              <label>Random per stroke</label>
              <label class="toggle">
                <input type="checkbox" id="randomColors">
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>
        </section>

        <!-- SHADOW -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.4"/><ellipse cx="10" cy="11" rx="4" ry="2.5" fill="currentColor" opacity=".2"/></svg>
            Shadow
          </div>
          <div class="field">
            <div class="toggle-row">
              <label>Enable</label>
              <label class="toggle">
                <input type="checkbox" id="enableShadows">
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>
          <div class="shadow-controls is-hidden" id="shadowControls">
            <div class="field">
              <label>Color</label>
              <input type="color" class="color-swatch" id="shadowColor" value="#000000">
            </div>
            <div class="field">
              <div class="label-row">
                <label>Blur</label>
                <span class="value-tag" id="shadowBlurValue">10</span>
              </div>
              <input type="range" id="shadowBlur" min="0" max="50" value="10" class="slider">
            </div>
            <button class="btn-ghost small" id="randomShadow">
              <svg viewBox="0 0 16 16" fill="none"><path d="M2 2h4l1.5 3L5 8h3l1 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Random Shadow
            </button>
          </div>
        </section>

        <!-- PATTERNS -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><polygon points="8,1 15,5.5 15,10.5 8,15 1,10.5 1,5.5" stroke="currentColor" stroke-width="1.4"/></svg>
            Patterns
          </div>
          <div class="patterns-grid" id="patternsGrid">
            <button class="pattern-btn" data-pattern="radial">Radial</button>
            <button class="pattern-btn" data-pattern="circular">Circular</button>
            <button class="pattern-btn" data-pattern="flower">Flower</button>
            <button class="pattern-btn" data-pattern="spiral">Spiral</button>
            <button class="pattern-btn" data-pattern="geometric">Geometric</button>
            <button class="pattern-btn" data-pattern="mandala">Full Mandala</button>
          </div>
          <button class="btn-primary full-width" id="applyPattern">Apply Pattern</button>
        </section>

        <!-- LAYERS -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><path d="M2 11l6 3 6-3M2 8l6 3 6-3M2 5l6-3 6 3-6 3-6-3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Layers
            <button class="btn-ghost tiny ml-auto" id="addLayer">+ Add</button>
          </div>
          <div class="layer-list" id="layerList"></div>
        </section>

        <!-- SAVED ARTWORKS -->
        <section class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
            Saved Works
          </div>
          <div class="artwork-list" id="artworkList">
            <p class="empty-msg">No saved artworks yet.</p>
          </div>
        </section>

      </aside>

      <!-- CANVAS AREA -->
      <main class="canvas-area">
        <div class="canvas-wrapper" id="canvasWrapper">
          <div class="canvas-container" id="canvasContainer">
            <canvas id="mandalaCanvas"></canvas>
            <div class="center-indicator" id="centerIndicator"></div>
          </div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="canvas-bar">
          <div class="zoom-controls">
            <button class="bar-btn" id="zoomOut">
              <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="7" x2="9" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <span class="zoom-label" id="zoomLevel">100%</span>
            <button class="bar-btn" id="zoomIn">
              <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/><line x1="7" y1="4" x2="7" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="4" y1="7" x2="10" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <button class="bar-btn" id="resetZoom" title="Reset zoom">1:1</button>
          </div>
          <p class="canvas-hint" id="canvasHint">Draw on one segment — symmetry mirrors the rest automatically.</p>
          <div class="autosave-indicator" id="autosaveIndicator">
            <svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M4 6l1.5 1.5L8 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Auto-saved</span>
          </div>
        </div>
      </main>
    </div>

    <!-- SAVE DIALOG -->
    <div class="modal-backdrop is-hidden" id="saveModal">
      <div class="modal">
        <h3>Save Artwork</h3>
        <input type="text" id="artworkName" class="text-input" placeholder="Untitled Mandala" maxlength="40">
        <div class="modal-actions">
          <button class="btn-ghost" id="cancelSave">Cancel</button>
          <button class="btn-primary" id="confirmSave">Save</button>
        </div>
      </div>
    </div>

  </div>

  <script src="mandala-canvas.js"></script>
</body>
</html>
