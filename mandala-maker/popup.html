<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mandala Maker</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="js/dropdowns.css">
  <script src="js/dropdowns.js" defer></script>
  <script src="popup.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="2" x2="12" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="16" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="8" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="16" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-name">Mandala Maker</span>
      </div>
    </header>

    <!-- Actions -->
    <div class="actions">
      <button id="openCanvas" class="btn-primary" type="button">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="1" x2="8" y2="5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="8" y1="11" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Open Studio
      </button>
      <button id="startDrawing" class="btn-outline" type="button">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 14s1-1 3-3l7-7a1.4 1.4 0 00-2-2L3 9c-2 2-1 5-1 5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Overlay Draw
      </button>
    </div>

    <!-- Quick settings -->
    <section class="section">
      <h2 class="section-title">Quick Setup</h2>

      <div class="field">
        <label for="symmetry">Symmetry</label>
        <select id="symmetry" class="select">
          <option value="4">4-fold</option>
          <option value="6" selected>6-fold</option>
          <option value="8">8-fold</option>
          <option value="12">12-fold</option>
          <option value="16">16-fold</option>
          <option value="24">24-fold</option>
        </select>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="brushSize">Brush Size</label>
          <span id="brushSizeValue" class="value-tag">10</span>
        </div>
        <input type="range" id="brushSize" min="1" max="50" value="10" class="slider">
      </div>

      <div class="field">
        <label for="brushColor">Color</label>
        <input type="color" id="brushColor" class="color-swatch" value="#2563EB">
      </div>
    </section>

    <!-- Patterns -->
    <section class="section">
      <h2 class="section-title">Patterns</h2>
      <div class="patterns-grid">
        <button class="pattern-item" data-pattern="radial" type="button">Radial</button>
        <button class="pattern-item" data-pattern="circular" type="button">Circular</button>
        <button class="pattern-item" data-pattern="flower" type="button">Flower</button>
        <button class="pattern-item" data-pattern="geometric" type="button">Geometric</button>
      </div>
    </section>

    <footer class="footer">
      <button id="openOptions" class="btn-ghost" type="button">Settings</button>
    </footer>
  </div>
</body>
</html>
