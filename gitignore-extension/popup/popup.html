<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>GitIgnore Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-body">

  <!-- ── HEADER ─────────────────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M13 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 3v6h6" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 13h6M9 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-copy">
        <h1>GitIgnore Pro</h1>
        <p>Smart ignore generation</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="openFullPageBtn" class="fullpage-button" type="button"
              title="Open full workspace in a new tab" aria-label="Open full page">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M15 3h6v6M10 14 21 3M21 14v7H3V5h7"
                stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle theme">
        <svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" hidden>
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── STATUS BANNER (shown after auto-detect) ── -->
  <div id="statusBanner" class="status-banner" hidden>
    <span id="statusText"></span>
  </div>

  <!-- ── STACK SELECTOR (scrollable, capped height) -->
  <section class="popup-section">
    <div class="section-row">
      <label class="section-label">Select Stacks</label>
      <span id="selectionSummary" class="mini-badge">0 selected</span>
    </div>
    <input id="stackSearch" class="text-input" type="text"
           placeholder="Search Node, Python, Docker…" autocomplete="off">
    <div id="stackSelection" class="popup-stack-grid"></div>
  </section>

  <!-- ── PREVIEW (compact, fixed height) ──────── -->
  <section class="popup-section preview-section">
    <div class="section-row">
      <label class="section-label">Preview</label>
      <span id="lineCount" class="mini-badge">0 lines</span>
    </div>
    <div id="fileTabs" class="file-tabs" role="tablist"></div>
    <div class="popup-editor-shell">
      <pre  id="editorHighlight" class="editor-highlight" aria-hidden="true"></pre>
      <textarea id="codeEditor" class="code-editor"
                spellcheck="false" aria-label="Generated .gitignore preview"></textarea>
    </div>
  </section>

  <!-- ── FOOTER ACTIONS ───────────────────────── -->
  <footer class="popup-footer">
    <div class="footer-left">
      <button id="autoDetectBtn" class="secondary-button" type="button">Auto-detect</button>
      <button id="resetBtn"      class="ghost-button"     type="button">Reset</button>
    </div>
    <div class="footer-right">
      <button id="copyBtn"         class="secondary-button" type="button">Copy</button>
      <button id="downloadBtn"     class="primary-button"   type="button">Download</button>
    </div>
  </footer>

  <div id="toast" class="toast" aria-live="polite" role="status"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
