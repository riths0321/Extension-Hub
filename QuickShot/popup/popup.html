<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickShot – Screen Capture Tool</title>

  <link rel="stylesheet" href="../ui.css">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="qs-app" id="app">
    <header class="qs-topbar">
      <div class="qs-brand">
        <h1 class="qs-title">QuickShot</h1>
        <p class="qs-subtitle">Capture → Annotate → Export</p>
      </div>
      <div class="qs-iconbar">
        <button class="qs-iconbtn" id="btn-history" type="button" title="History" aria-label="History">🕘</button>
        <button class="qs-iconbtn" id="btn-options" type="button" title="Options" aria-label="Options">⚙️</button>
        <button class="qs-iconbtn" id="btn-theme" type="button" title="Toggle dark/light mode" aria-label="Theme">🌙</button>
      </div>
    </header>

    <section class="qs-card">
      <div class="qs-card-hd">
        <div>
          <p class="qs-card-title">Capture</p>
          <p class="qs-card-sub">Fast, minimal, instant</p>
        </div>
        <div class="qs-row" aria-hidden="true">
          <span class="qs-kbd">Alt+Shift+1</span>
          <span class="qs-kbd">Alt+Shift+3</span>
        </div>
      </div>
      <div class="qs-card-bd">
        <div class="qs-capture-grid">
          <button class="qs-btn qs-btn-primary" id="btn-capture-visible" type="button">Capture Visible</button>
          <button class="qs-btn" id="btn-capture-area" type="button">Capture Selection</button>
        </div>
        <div class="qs-inline" style="margin-top:10px;">
          <div class="qs-hint" id="capture-status">Ready</div>
        </div>
      </div>
    </section>
  </div>

  <div class="qs-modal-backdrop" id="text-backdrop" data-open="false" aria-hidden="true">
    <div class="qs-modal" role="dialog" aria-modal="true" aria-labelledby="text-title">
      <div class="qs-modal-hd">
        <p class="qs-modal-title" id="text-title">Add Text</p>
        <button class="qs-iconbtn" id="text-close" type="button" aria-label="Close">✕</button>
      </div>
      <div class="qs-modal-bd">
        <label class="qs-label" for="text-value">Text</label>
        <textarea class="qs-input" id="text-value" rows="3" placeholder="Type…"></textarea>
        <div class="qs-row">
          <div class="qs-field" style="min-width: 0;">
            <div class="qs-label">Size</div>
            <input class="qs-input" id="text-size" type="number" min="10" max="72" value="22">
          </div>
          <div class="qs-field" style="min-width: 0;">
            <div class="qs-label">Opacity</div>
            <input class="qs-input" id="text-opacity" type="number" min="10" max="100" value="100">
          </div>
        </div>
      </div>
      <div class="qs-modal-actions">
        <button class="qs-btn" id="text-cancel" type="button">Cancel</button>
        <button class="qs-btn qs-btn-primary" id="text-apply" type="button">Place Text</button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
