<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>README Generator</title>
<link rel="stylesheet" href="popup.css">
</head>

<body>
<div class="container">

  <div class="header">
    <div class="logo-ring">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect x="3" y="6" width="24" height="3" rx="1.5" fill="white"/>
        <rect x="3" y="12" width="18" height="3" rx="1.5" fill="white" opacity="0.8"/>
        <rect x="3" y="18" width="22" height="3" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="3" y="24" width="14" height="3" rx="1.5" fill="white" opacity="0.4"/>
        <circle cx="28" cy="26" r="7" fill="#00e5ff" opacity="0.9"/>
        <path d="M25 26l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1 class="title">README Generator</h1>
      <p class="subtitle">Professional Markdown, Instantly</p>
    </div>
  </div>

  <div class="field-group">
    <label class="label">
      <span class="label-icon">📋</span>
      Project Description
    </label>
    <textarea id="projectInput" placeholder="Describe your project... (min 30 characters)&#10;&#10;Include features, purpose, tech stack — the more detail, the better your README!"></textarea>
    <div class="char-counter"><span id="charCount">0</span> / 30 min</div>
  </div>

  <div class="field-row">
    <div class="field-group half">
      <label class="label">
        <span class="label-icon">🧩</span>
        Template
      </label>
      <select id="templateSelect">
        <option value="standard">⭐ Standard</option>
        <option value="minimal">✦ Minimal</option>
        <option value="full">🚀 Full Pro</option>
      </select>
    </div>
    <div class="field-group half">
      <label class="label">
        <span class="label-icon">🏷️</span>
        License
      </label>
      <select id="licenseSelect">
        <option value="MIT">MIT</option>
        <option value="Apache-2.0">Apache 2.0</option>
        <option value="GPL-3.0">GPL 3.0</option>
        <option value="ISC">ISC</option>
        <option value="none">None</option>
      </select>
    </div>
  </div>

  <button id="generateBtn" disabled>
    <span class="btn-icon">⚡</span>
    <span class="btn-text">GENERATE README</span>
    <span class="btn-arrow">→</span>
  </button>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <span class="result-label">📄 Preview</span>
      <div class="result-actions">
        <button id="copyBtn" class="action-btn" disabled title="Copy to clipboard">
          <span>Copy</span>
        </button>
        <button id="downloadBtn" class="action-btn" disabled title="Download README.md">
          <span>Download</span>
        </button>
      </div>
    </div>
    <div class="result-box">
      <pre id="previewArea">Your README will appear here…

Start by describing your project above, then hit Generate!</pre>
    </div>
  </div>

  <div class="footer-row">
    <button id="clearBtn" class="ghost-btn">✖ Clear All</button>
    <span class="footer-text">🔒 100% Local — No Data Sent</span>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
