<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Perfect Color Picker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <div class="header-row">
          <div class="brand">
            <img src="icons/icon48.png" alt="" width="22" height="22" />
            <h1 class="title">Pixel Perfect</h1>
          </div>

          <div class="header-actions">
            <a
              id="rate-link"
              class="icon-btn rate-btn"
              href="https://chromewebstore.google.com/detail/pixel-perfect-color-picke/kmpiebbhgoghpnngomnmcbmionnieimj/reviews"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Rate this extension"
              title="Rate this extension"
            >
              ★
            </a>
            <button
              id="history-search-toggle"
              class="icon-btn"
              type="button"
              aria-label="Search history"
              title="Search history"
            >
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
                <path
                  d="M10 18a8 8 0 1 1 5.293-2.004l4.356 4.357a1 1 0 0 1-1.414 1.414l-4.357-4.356A7.96 7.96 0 0 1 10 18Zm0-2a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"
                  fill="currentColor"
                />
              </svg>
            </button>
            <button
              id="theme-toggle"
              class="icon-btn"
              type="button"
              aria-label="Toggle theme"
              title="Toggle theme"
            >
              🌙
            </button>
          </div>
        </div>
        <p class="subtitle">Pick pixels, copy formats, generate palettes, check contrast.</p>

        <div id="history-search-row" class="search-row hidden" aria-label="History search">
          <input
            id="history-search"
            class="search-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            placeholder="Search recent colors (e.g. 3B82F6)"
          />
          <button id="history-search-clear" class="ghost-btn" type="button">Clear</button>
        </div>
      </header>

      <main class="main">
        <button id="btn-pick" class="primary-btn" type="button">
          <span class="btn-icon" aria-hidden="true">🎯</span>
          <span>Pick Color</span>
        </button>

        <section id="panel-section" class="card" aria-label="Color picker panel">
          <div class="panel-head">
            <div class="card-title">Color Picker</div>
            <div id="panel-hex" class="panel-hex mono">#000000</div>
          </div>
          <div class="picker" aria-label="Color picker controls">
            <div id="sv" class="sv" role="application" aria-label="Saturation and brightness">
              <div id="sv-handle" class="pick-handle" aria-hidden="true"></div>
            </div>
            <div id="hue" class="hue" role="application" aria-label="Hue">
              <div id="hue-handle" class="pick-handle pick-handle-hue" aria-hidden="true"></div>
            </div>
          </div>
        </section>

        <section id="preview-section" class="card hidden" aria-label="Picked color">
          <div class="swatch-row">
            <div id="color-swatch" class="swatch" aria-label="Color swatch"></div>
            <div class="swatch-meta">
              <div class="meta-label">Current</div>
              <div id="picked-hex" class="meta-value">#000000</div>
            </div>
          </div>

          <div class="fields">
            <div class="field">
              <div class="field-label">HEX</div>
              <div class="field-row">
                <input id="val-hex" class="field-input mono" inputmode="text" autocomplete="off" />
                <button class="copy-btn" type="button" data-copy="hex" aria-label="Copy HEX">Copy</button>
              </div>
            </div>

            <div class="field">
              <div class="field-label">RGB</div>
              <div class="field-row">
                <input id="val-rgb" class="field-input mono" inputmode="text" autocomplete="off" />
                <button class="copy-btn" type="button" data-copy="rgb" aria-label="Copy RGB">Copy</button>
              </div>
            </div>

            <div class="field">
              <div class="field-label">HSL</div>
              <div class="field-row">
                <input id="val-hsl" class="field-input mono" inputmode="text" autocomplete="off" />
                <button class="copy-btn" type="button" data-copy="hsl" aria-label="Copy HSL">Copy</button>
              </div>
            </div>
          </div>

          <p id="inline-error" class="inline-error hidden" role="status"></p>
        </section>

        <section id="palette-section" class="card" aria-label="Generated palettes">
          <div class="card-head">
            <div class="card-title">Generate Palette</div>
            <div id="palette-hex" class="hex-chip mono">#000000</div>
          </div>

          <div class="palette-actions" role="tablist" aria-label="Palette mode">
            <button class="pill-btn active" type="button" data-palette="mono" role="tab" aria-selected="true">Monochromatic</button>
            <button class="pill-btn" type="button" data-palette="complementary" role="tab" aria-selected="false">Complementary</button>
            <button class="pill-btn" type="button" data-palette="analogous" role="tab" aria-selected="false">Analogous</button>
            <button class="pill-btn" type="button" data-palette="auto" role="tab" aria-selected="false">Auto</button>
          </div>

          <div class="generated-label">Generated Colors</div>
          <div id="palette-grid" class="palette-strip" aria-label="Palette colors"></div>

          <div class="export-head">
            <div class="export-title">Export Palette</div>
          </div>
          <div class="export-row" aria-label="Export buttons">
            <button id="export-ase" class="export-btn export-ase" type="button">Adobe (.ase)</button>
            <button id="export-gpl" class="export-btn export-gpl" type="button">GIMP (.gpl)</button>
            <button id="export-json" class="export-btn export-json" type="button">JSON (.json)</button>
          </div>
        </section>

        <section id="contrast-section" class="card hidden" aria-label="WCAG contrast checker">
          <div class="card-head">
            <div class="card-title">Contrast (WCAG)</div>
            <button id="swap-contrast" class="ghost-btn" type="button" aria-label="Swap foreground and background">
              Swap
            </button>
          </div>

          <div class="contrast-grid">
            <button id="fg-btn" class="contrast-chip" type="button" aria-label="Set foreground from current color">
              <span id="fg-swatch" class="chip-swatch" aria-hidden="true"></span>
              <span class="chip-text">Foreground</span>
            </button>
            <button id="bg-btn" class="contrast-chip" type="button" aria-label="Set background from current color">
              <span id="bg-swatch" class="chip-swatch" aria-hidden="true"></span>
              <span class="chip-text">Background</span>
            </button>
          </div>

          <div class="contrast-result">
            <div class="ratio">
              <div class="ratio-label">Ratio</div>
              <div id="contrast-ratio" class="ratio-value">--</div>
            </div>
            <div class="badges">
              <span id="badge-aa" class="badge">AA</span>
              <span id="badge-aaa" class="badge">AAA</span>
            </div>
          </div>

          <div class="contrast-help">
            AA requires 4.5:1 (normal text). AAA requires 7:1.
          </div>
        </section>

        <section class="history" aria-label="Recent colors">
          <div class="history-head">
            <div class="card-title">Recent</div>
            <button id="clear-history" class="ghost-btn" type="button">Clear</button>
          </div>
          <div id="history-grid" class="history-grid"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
