<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Time to Hydrate!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="alert-page">
  <!-- Background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="drops-container" id="drops-container"></div>

  <div class="container">
    <!-- Alert Header -->
    <div class="alert-header">
      <span class="alert-icon">💧</span>
      <h2>Time to Hydrate!</h2>
      <p>Your body needs water right now</p>
    </div>

    <!-- Progress Ring -->
    <div class="card">
      <div class="ring-container">
        <svg class="ring-svg" width="120" height="120" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#0288d1" />
              <stop offset="100%" stop-color="#26c6da" />
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="60" cy="60" r="50" />
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50"
            stroke-dasharray="314"
            stroke-dashoffset="314" />
        </svg>
        <div class="ring-center">
          <span class="ring-percent" id="ring-percent">0%</span>
          <span class="ring-label">of goal</span>
        </div>
      </div>

      <div class="progress-label">
        <span id="status-text">0 / 3000 ml</span>
        <div class="streak-badge">
          🔥 <span id="streak-count">0</span> days
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-secondary" id="snooze-btn">⏰ Snooze 5m</button>
      <button class="btn-primary" id="drink-btn">💧 +250ml</button>
    </div>
  </div>

  <script src="alert.js"></script>
</body>
</html>
