<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Water Alert</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background Effects -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="drops-container" id="drops-container"></div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">💧</div>
      <div class="header-text">
        <h2>Water Alert</h2>
        <p>Stay hydrated, stay healthy</p>
      </div>
    </div>

    <!-- Today's Progress Card -->
    <div class="card">
      <div class="streak-row">
        <span class="section-title no-margin">Today</span>
        <div class="streak-badge">
          🔥 <span class="streak-num" id="streak-count">0</span> day streak
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-value" id="consumed-val">0</span>
          <span class="stat-label">ml consumed</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="remaining-val">3000</span>
          <span class="stat-label">ml remaining</span>
        </div>
      </div>

      <div class="progress-label">
        <span>Daily progress</span>
        <strong id="percent-val">0%</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="goal-complete" id="goal-complete">
        🎉 Daily goal reached! Amazing work!
      </div>
    </div>

    <!-- Quick Add Button -->
    <button class="btn-primary" id="drink-btn">
      💧 Log 250ml Water
    </button>

    <div class="divider"></div>

    <!-- Settings Card -->
    <div class="card">
      <div class="section-title">Reminder Settings</div>

      <div class="form-group">
        <label>Interval (minutes)</label>
        <input type="number" id="interval" min="1" max="180" placeholder="30" />
      </div>

      <div class="toggle-row" id="hourly-toggle-row">
        <div>
          <div class="toggle-label-text">Hourly Reminders</div>
          <div class="toggle-label-sub">Override interval to 60 min</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="hourly" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="form-group">
        <label>Daily Goal (ml)</label>
        <input type="number" id="goal" min="500" max="8000" placeholder="3000" />
      </div>
    </div>

    <!-- Quiet Hours Card -->
    <div class="card">
      <div class="section-title">Quiet Hours</div>
      <div class="form-group">
        <label>Do not disturb between</label>
        <div class="time-row">
          <input type="time" id="quiet-start" />
          <input type="time" id="quiet-end" />
        </div>
      </div>

      <div class="toggle-row">
        <div>
          <div class="toggle-label-text">Quiet Hours Active</div>
          <div class="toggle-label-sub">Pause reminders in range</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="quiet-enabled" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Save -->
    <button class="btn-save" id="save-btn">Save Settings</button>

    <!-- Tip -->
    <div class="tip-card" id="tip-card">
      <span>💡</span>
      <span id="tip-text">Loading tip...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
