<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Read</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-wrap">

        <!-- Header -->
        <header class="popup-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M2 6C2 4.9 2.9 4 4 4h6c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6z" stroke="currentColor" stroke-width="1.7"/>
                        <path d="M12 6c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2h-6c-1.1 0-2-.9-2-2V6z" stroke="currentColor" stroke-width="1.7"/>
                        <line x1="5" y1="8" x2="9" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        <line x1="5" y1="11" x2="9" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        <line x1="5" y1="14" x2="8" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        <line x1="15" y1="8" x2="19" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        <line x1="15" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        <line x1="15" y1="14" x2="18" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <span class="brand-name">Just Read</span>
                    <span class="brand-tagline">Focus mode</span>
                </div>
            </div>
            <div class="status-pill" id="statusPill">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-label" id="statusLabel">Off</span>
            </div>
        </header>

        <!-- Main toggle -->
        <div class="toggle-section">
            <button class="toggle-btn" id="toggleBtn">
                <div class="toggle-btn-inner">
                    <div class="toggle-spinner hidden" id="toggleSpinner">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M21 12a9 9 0 11-4.219-7.61" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <svg class="toggle-icon" id="toggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="toggle-label" id="toggleLabel">Enter Reading Mode</span>
                </div>
            </button>
        </div>

        <div class="divider"></div>

        <!-- Quick settings -->
        <div class="quick-panel">
            <p class="panel-title">Quick Settings</p>

            <div class="setting-row">
                <div class="setting-info">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>Dark Mode</span>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
            </div>

            <div class="setting-row">
                <div class="setting-info">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 15l9-9a2 2 0 012.83 2.83L11.83 18 8 19l1-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <span>Serif Font</span>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="serifToggle">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
            </div>

            <div class="setting-row">
                <div class="setting-info">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <span>Font Size</span>
                </div>
                <div class="seg-select" id="fontSizeSeg">
                    <button class="seg-opt" data-val="small">S</button>
                    <button class="seg-opt active" data-val="medium">M</button>
                    <button class="seg-opt" data-val="large">L</button>
                    <button class="seg-opt" data-val="xlarge">XL</button>
                </div>
            </div>

            <div class="setting-row">
                <div class="setting-info">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 10h18M3 14h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <span>Line Spacing</span>
                </div>
                <div class="seg-select" id="lineHeightSeg">
                    <button class="seg-opt" data-val="1.4">Tight</button>
                    <button class="seg-opt active" data-val="1.6">Normal</button>
                    <button class="seg-opt" data-val="2.0">Loose</button>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Footer -->
        <footer class="popup-footer">
            <button class="foot-btn" id="optionsBtn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>
                Settings
            </button>
            <button class="foot-btn" id="shortcutsBtn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M6 10h2M10 10h2M14 10h2M6 14h4M12 14h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Shortcuts
            </button>
        </footer>

        <!-- Shortcuts overlay -->
        <div class="shortcuts-overlay hidden" id="shortcutsOverlay">
            <div class="shortcuts-card">
                <div class="shortcuts-header">
                    <span>Keyboard Shortcuts</span>
                    <button class="close-btn" id="closeShortcuts">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
                    </button>
                </div>
                <div class="shortcut-item">
                    <span>Toggle reading mode</span>
                    <div class="kbd-group"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>R</kbd></div>
                </div>
                <div class="shortcut-item">
                    <span>Exit reading mode</span>
                    <div class="kbd-group"><kbd>Esc</kbd></div>
                </div>
                <div class="shortcut-item">
                    <span>Larger text</span>
                    <div class="kbd-group"><kbd>Ctrl</kbd><kbd>+</kbd></div>
                </div>
                <div class="shortcut-item">
                    <span>Smaller text</span>
                    <div class="kbd-group"><kbd>Ctrl</kbd><kbd>−</kbd></div>
                </div>
            </div>
        </div>

    </div>
    <script src="popup.js"></script>
</body>
</html>
