<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobShield - Job Scam Detector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <img src="icons/icon128.png" alt="JobShield Logo" class="icon-logo" />
        <h1>JobShield</h1>
      </div>
      <div class="header-controls">
        <button id="settingsBtn" class="icon-btn" title="Settings" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="status-card" id="statusCard">
        <div class="status-header">
          <div class="status-icon-wrapper" id="statusIcon">
            <span id="statusGlyph" class="status-svg">⏳</span>
          </div>
        </div>
        <div class="status-text">
          <h2 id="statusTitle">Analyzing Page...</h2>
          <p id="statusSubtitle" class="status-subtitle">Scanning for potential job scams</p>
        </div>

        <div class="score-container" id="riskScore">
          <div class="score-bar-bg">
            <div class="score-bar-fill" id="scoreFill"></div>
          </div>
          <div class="score-value" id="scoreLabel">0/100</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Words</span>
            <span class="stat-value" id="wordsScanned">0</span>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Time</span>
            <span class="stat-value" id="analysisTime">0ms</span>
          </div>
        </div>
        <div class="stat-item full-width">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Domain</span>
            <span class="stat-value truncate" id="domainInfo">Unknown</span>
          </div>
        </div>
      </div>

      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
          <line x1="4" y1="22" x2="4" y2="15"></line>
        </svg>
        <h3>Detected Risks</h3>
      </div>

      <div class="flags-container">
        <ul id="flagsList" class="flags-list">
          <li class="no-flags-state">
            <span>No suspicious detected</span>
          </li>
        </ul>
      </div>

      <div class="action-buttons">
        <button id="rescanBtn" class="btn btn-primary" type="button">Scan Again</button>
        <button id="viewHistoryBtn" class="btn btn-outline" type="button">History</button>
      </div>
    </main>

    <footer class="footer">
      <p id="hintText">Secure & Local</p>
      <p class="copyright">&copy; Anslation Company</p>
    </footer>
  </div>

  <div id="historyModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="close-modal" data-close="historyModal" type="button">&times;</button>
      <div class="modal-header">
        <h2>Scan History</h2>
      </div>
      <div id="historyList"></div>
      <div class="modal-footer">
        <button id="clearHistoryBtn" class="btn btn-text text-danger" type="button">Clear History</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="close-modal" data-close="settingsModal" type="button">&times;</button>
      <div class="modal-header">
        <h2>Settings</h2>
      </div>
      <div class="settings-options">
        <label class="setting-item">
          <div class="setting-info">
            <span class="setting-title">Auto Scan</span>
            <span class="setting-desc">Scan job pages automatically</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="autoScan" checked />
            <span class="slider"></span>
          </div>
        </label>
        <label class="setting-item">
          <div class="setting-info">
            <span class="setting-title">Status Badge</span>
            <span class="setting-desc">Show safety badge on page</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="showBadge" checked />
            <span class="slider"></span>
          </div>
        </label>
        <label class="setting-item">
          <div class="setting-info">
            <span class="setting-title">Sound Alerts</span>
            <span class="setting-desc">Play sound on danger detection</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="enableSound" checked />
            <span class="slider"></span>
          </div>
        </label>
        <div class="setting-group">
          <label class="setting-label">Sensitivity</label>
          <select id="sensitivityLevel" class="select-input">
            <option value="low">Low (Strict)</option>
            <option value="medium" selected>Medium (Balanced)</option>
            <option value="high">High (Cautious)</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
