<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Optimizer Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <div class="header-text">
      <h1 class="app-title">Image Optimizer Pro</h1>
      <p class="app-subtitle">Compress &amp; Resize — All Local</p>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">

    <!-- UPLOAD SECTION -->
    <section class="upload-section" id="uploadSection">
      <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Upload image by clicking or dragging">
        <div class="drop-zone-inner">
          <div class="drop-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <p class="drop-label">Drag &amp; drop your image here</p>
          <p class="drop-sublabel">JPG, PNG, WEBP supported</p>
          <label class="btn-upload" for="fileInput">
            Choose File
          </label>
          <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" class="file-input-hidden" />
        </div>
      </div>
      <div class="error-message" id="errorMessage" role="alert" aria-live="polite"></div>
    </section>

    <!-- WORKSPACE (hidden until image loaded) -->
    <div class="workspace" id="workspace" aria-hidden="true">

      <!-- MODE TOGGLE -->
      <div class="mode-toggle" role="tablist" aria-label="Processing mode">
        <button class="mode-btn active" id="btnCompress" role="tab" aria-selected="true" aria-controls="panelCompress" data-mode="compress">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
            <line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/>
          </svg>
          Compress
        </button>
        <button class="mode-btn" id="btnResize" role="tab" aria-selected="false" aria-controls="panelResize" data-mode="resize">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          Resize
        </button>
      </div>

      <!-- COMPRESS PANEL -->
      <div class="control-panel" id="panelCompress" role="tabpanel" aria-labelledby="btnCompress">
        <div class="control-group">
          <div class="control-label-row">
            <label class="control-label" for="qualitySlider">Quality</label>
            <span class="control-value" id="qualityValue">80%</span>
          </div>
          <input type="range" id="qualitySlider" min="10" max="100" value="80" step="1" class="slider" aria-label="Compression quality" />
          <div class="slider-marks">
            <span>10%</span>
            <span>55%</span>
            <span>100%</span>
          </div>
        </div>
      </div>

      <!-- RESIZE PANEL -->
      <div class="control-panel hidden" id="panelResize" role="tabpanel" aria-labelledby="btnResize">
        <div class="dimension-inputs">
          <div class="input-group">
            <label class="input-label" for="widthInput">Width (px)</label>
            <input type="number" id="widthInput" class="dim-input" min="1" max="9999" placeholder="Width" aria-label="Width in pixels" />
          </div>
          <div class="lock-icon-wrap" id="lockToggle" role="button" tabindex="0" aria-pressed="true" aria-label="Lock aspect ratio">
            <svg class="lock-icon" id="lockIconSvg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <div class="input-group">
            <label class="input-label" for="heightInput">Height (px)</label>
            <input type="number" id="heightInput" class="dim-input" min="1" max="9999" placeholder="Height" aria-label="Height in pixels" />
          </div>
        </div>
        <div class="presets">
          <span class="presets-label">Presets:</span>
          <button class="preset-btn" data-w="1280" data-h="720">720p</button>
          <button class="preset-btn" data-w="1920" data-h="1080">1080p</button>
        </div>
      </div>

      <!-- PREVIEW SECTION -->
      <section class="preview-section">
        <div class="preview-card">
          <p class="preview-label">Original</p>
          <div class="preview-img-wrap">
            <img id="previewOriginal" class="preview-img" alt="Original image preview" />
          </div>
          <p class="preview-meta" id="metaOriginal">—</p>
        </div>
        <div class="preview-divider">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
        <div class="preview-card">
          <p class="preview-label">Processed</p>
          <div class="preview-img-wrap">
            <img id="previewProcessed" class="preview-img" alt="Processed image preview" />
          </div>
          <p class="preview-meta" id="metaProcessed">—</p>
        </div>
      </section>

      <!-- DOWNLOAD ROW -->
      <div class="download-row">
        <div class="format-group" role="group" aria-label="Output format">
          <button class="fmt-btn active" data-fmt="jpeg" aria-pressed="true">JPG</button>
          <button class="fmt-btn" data-fmt="png" aria-pressed="false">PNG</button>
          <button class="fmt-btn" data-fmt="webp" aria-pressed="false">WEBP</button>
        </div>
        <button class="btn-download" id="btnDownload" aria-label="Download processed image">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download
        </button>
      </div>

    </div><!-- /workspace -->

  </main>

  <script src="popup.js"></script>
</body>
</html>
