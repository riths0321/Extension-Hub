<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Text to PDF Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">
    <h3>Text to PDF</h3>

    <div class="input-group">
      <label>Filename</label>
      <input id="fileName" placeholder="e.g., notes-2026" />
    </div>

    <div class="input-group">
      <label>Content</label>
      <textarea id="textInput" placeholder="Start typing..."></textarea>
    </div>

    <div class="footer-info">
      <span id="charCount">0</span> characters
      <span id="wordCount">0 words</span>
    </div>

    <div class="btn-container">
      <button id="pdfBtn" class="pdf-btn" disabled>Export as PDF</button>
      <button id="txtBtn" class="txt-btn" disabled>Download .txt</button>
    </div>
  </div>

  <!-- Hidden Render Zone -->
  <div id="pdfRenderContainer"></div>

  <script src="lib/marked.min.js"></script>
  <script src="lib/purify.min.js"></script>
  <script src="lib/html2canvas.min.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="popup.js" ></script>
</body>

</html>
