<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionary Search</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <p class="eyebrow">Language Assistant</p>
                <h1>Dictionary Search</h1>
            </div>
            <form id="searchForm" class="search-form">
                <div class="input-group">
                    <input
                        type="text"
                        name="search"
                        id="searchInput"
                        placeholder="Search word or sentence..."
                        autocomplete="off"
                        required
                    />
                    <button type="submit" aria-label="Search">Search</button>
                </div>
            </form>
        </header>

        <main>
            <div id="result" class="result">
                <div class="empty-state" id="emptyState">
                    <p>Type a word to get definition, phonetics and examples.</p>
                </div>

                <div id="wordContent" class="word-content displayNone"></div>

                <div id="loading" class="loading displayNone" aria-live="polite">
                    <div class="spinner"></div>
                    <p>Looking up meaning...</p>
                </div>

                <div id="error" class="error displayNone"></div>
            </div>
        </main>

        <footer class="app-footer">
            <button id="clearBtn" class="action-btn" type="button">Clear</button>
            <p id="statusText" class="status-text">Ready</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
